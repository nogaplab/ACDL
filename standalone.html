<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ACDL Prompt Visualizer - Standalone</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
/* ======================================================
   ACDL PROMPT VISUALIZER - ACADEMIC PAPER STYLE
   Clean, professional design for research publications
   ====================================================== */

:root {
  /* Light, professional color palette */
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-tertiary: #f1f3f4;

  --border-light: #e1e4e8;
  --border-medium: #d0d7de;
  --border-dark: #b0b8c1;

  --text-primary: #1f2328;
  --text-secondary: #57606a;
  --text-muted: #8b949e;

  /* Role colors - professional, muted tones */
  --system-bg: #f0f7ff;
  --system-border: #0969da;
  --system-text: #0550ae;
  
  --assistant-bg: #e6fafa;
  --assistant-border: #1acad1;
  --assistant-text: #0a9196;

  --tool-bg: #ffebe6;
  --tool-border: #f7660b;
  --tool-text: #800d00;

  --user-bg: #fff8e6;
  --user-border: #e5990b;
  --user-text: #805600;

  --none-bg: #f5f5f5;
  --none-border: #6e7781;
  --none-text: #57606a;

  /* Control flow colors - subtle blue-gray */
  --control-bg: #f6f8fa;
  --control-border: #6e7781;
  --control-text: #57606a;
  --control-header-bg: #eaeef2;

  /* Accent colors for inline elements */
  --accent-template: #9333ea;
  --accent-template-bg: #faf5ff;
  /* Functions - purple */
  --accent-function: #9333ea;
  --accent-function-bg: #faf5ff;
  /* Context variables - teal */
  --accent-context: #0da66b;
  --accent-context-bg: #e0ffdd;
  /* Variables (all indexes, iterables) - light blue */
  --accent-variable: #0969da;
  --accent-variable-bg: rgba(9, 105, 218, 0.12);

  /* Legacy aliases for backwards compatibility */
  --accent-index: var(--accent-variable);
  --accent-index-bg: var(--accent-variable-bg);
  --accent-other-index: var(--accent-variable);
  --accent-other-index-bg: var(--accent-variable-bg);
  --accent-expr: #c2410c;
  --accent-expr-bg: rgba(251, 146, 60, 0.15);
  --accent-expr-border: #ea580c;
  --accent-comment: #6e7781;
}

/* ======================================================
   GLOBAL STYLES
   ====================================================== */

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 40px;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
}

* {
  box-sizing: border-box;
}

/* ======================================================
   PROMPT CONTAINER
   ====================================================== */

.prompt-container {
  display: inline-block;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  padding-left: 24px;
  border-left: 2px solid var(--border-medium);
}

/* Divider between multiple prompts in the same file */
.prompt-divider {
  height: 24px;
  margin: 16px 0;
  border-bottom: 1px dashed var(--border-medium);
}

/* File-level comments (between prompts) */
.file-comment {
  color: var(--text-muted);
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 13px;
  font-style: italic;
  margin: 12px 0;
  padding-left: 24px;
}

/* ======================================================
   PROMPT TITLE
   ====================================================== */

.prompt-title {
  background: var(--bg-secondary);
  border: 1px solid var(--border-medium);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 16px;
  margin-left: -24px;
  padding-left: 24px;
}

.prompt-title h1 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  white-space: nowrap;
}

/* Ensure time-index is visible in title */
.prompt-title .time-index {
  display: inline;
  font-size: inherit;
  color: var(--accent-variable);
  font-weight: 700;
}

/* ======================================================
   ROLE MESSAGES
   ====================================================== */

.role-message {
  border: none;
  border-left: 1px solid var(--border-medium);
  border-radius: 0;
  margin: 4px 0;
  padding-top: 6px;
  position: relative;
}

.role-message.system {
  border-left-color: var(--system-border);
}

.role-message.user {
  border-left-color: var(--user-border);
}

.role-message.assistant {
  border-left-color: var(--assistant-border);
}

.role-message.tool {
  border-left-color: var(--tool-border);
}

/* Role header badge - compact badge that wraps text */
.role-message-header {
  display: inline-block;
  padding: 2px 12px;
  margin: 4px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-radius: 4px;
}

.role-message.system .role-message-header {
  background: var(--system-border);
  color: white;
}

.role-message.user .role-message-header {
  background: var(--user-border);
  color: white;
}

.role-message.assistant .role-message-header {
  background: var(--assistant-border);
  color: white;
}

.role-message.tool .role-message-header {
  background: var(--tool-border);
  color: white;
}

/* ======================================================
   NONE/COMPLETION PROMPT MESSAGE
   ====================================================== */

.none-message {
  border: 1px solid var(--none-border);
  border-radius: 6px;
  margin: 4px 0;
  position: relative;
  overflow: hidden;
}

.none-message:hover {
  border-color: var(--border-dark);
}

.none-message-header {
  display: inline-block;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-radius: 0 0 4px 0;
  background: var(--none-border);
  color: white;
}

.role-body-block {
  padding: 2px 12px;
  white-space: normal;
  word-wrap: break-word;
}

/* ======================================================
   INLINE ELEMENTS - Templates, Functions, Variables
   ====================================================== */

.template-block {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  gap: 4px;
  background: var(--accent-template-bg);
  border: 1px solid var(--accent-template);
  color: var(--accent-template);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  line-height: 1;
  max-width: 100%;
}

.template-block::before {
  content: '◆';
  font-size: 10px;
  opacity: 0.7;
  line-height: 1;
  flex-shrink: 0;
}

.template-name-and-args {
  display: inline;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.func-block {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  background: var(--accent-function-bg);
  border: 1px solid var(--accent-function);
  color: var(--accent-function);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  line-height: 1;
  max-width: 100%;
}

.func-name {
  font-weight: 600;
  flex-shrink: 0;
}

.func-args-wrapper {
  display: inline;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.func-parens {
  color: var(--accent-function);
  opacity: 0.7;
}

.context-var {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  gap: 2px;
  background: var(--accent-context-bg);
  border: 1px solid var(--accent-context);
  color: var(--accent-context);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  line-height: 1;
}

.context-var .segment {
  display: inline-flex;
  align-items: center;
  color: var(--accent-context);
  line-height: 1;
}

.context-var .segment.base {
  font-weight: 600;
}

/* Environment variables (env.*) - teal styling */
.context-var.context-var-env {
  background: var(--accent-context-bg);
  border-color: var(--accent-context);
  color: var(--accent-context);
}

.context-var.context-var-env .segment {
  color: var(--accent-context);
}

/* Indices - All variables use light blue, no background */
.time-index {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  line-height: 1;
}

/* @ symbol in time indices - wrapped for html2canvas compatibility */
.at-symbol {
  color: inherit;
}

/* Ensure time-index is styled correctly even when nested inside context-var */
.context-var .time-index,
.context-var .segment .time-index,
.context-var-env .time-index,
.context-var-env .segment .time-index,
.expr-context-var .time-index {
  color: var(--accent-variable);
}

.other-index {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  line-height: 1;
}

/* Index content - numbers and identifiers inside indices */
.index-number,
.index-identifier {
  color: var(--accent-variable);
  font-weight: 700;
  line-height: 1;
}

/* Arithmetic operators inside indices - black/neutral */
.arith-op {
  color: var(--text-primary);
  font-weight: 400;
}

/* Control flow keywords - bold and prominent */
.keyword {
  display: inline-flex;
  align-items: center;
  color: #000000;
  font-weight: 800;
  letter-spacing: 0.3px;
}

/* ======================================================
   EXPRESSION TOKENS - Inside conditions, iterables, switches
   ====================================================== */

/* Base expression class - all expression tokens inherit from this */
.expr,
.expr-context-var,
.expr-namespace,
.expr-ident,
.expr-number,
.expr-keyword,
.expr-symbol,
.expr-logic-op,
.expr-arith-op,
.expr-range,
.expr-string {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  padding-left: 2px;
  padding-right: 2px;
}

/* Context vars in expressions (env.foo, sys.bar(x), etc.) - green with box */
.expr-context-var {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  gap: 2px;
  background: var(--accent-context-bg);
  border: 1px solid var(--accent-context);
  color: var(--accent-context);
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 500;
  line-height: 1;
}

/* Namespace keywords (env, sys, resp, prompt) - green like context vars */
.expr-namespace {
  color: var(--accent-context);
  font-weight: 700;
}

/* Identifiers in expressions - light blue like all variables */
.expr-ident {
  color: var(--accent-variable);
  font-weight: 600;
}

/* Numbers in expressions - light blue like all variables */
.expr-number {
  color: var(--accent-variable);
  font-weight: 600;
}

/* Logical keywords in expressions (and, or) */
.expr-keyword {
  color: var(--text-primary);
  font-weight: 600;
}

/* Symbols like . [ ] , */
.expr-symbol {
  color: var(--text-secondary);
}

/* @ symbol for time indices - light blue */
.expr-at {
  color: var(--accent-variable);
  font-weight: 700;
}

/* Logical operators (=, !, <, >, &, |, ^) */
.expr-logic-op {
  color: var(--text-primary);
  font-weight: 700;
  font-variant-ligatures: none;
  padding: 0 2px;
}

/* Arithmetic operators (+, -, *, /, %) */
.expr-arith-op {
  color: var(--text-primary);
  font-weight: 600;
  padding: 0 1px;
}

/* Range operators (... or …) */
.expr-range {
  color: var(--text-secondary);
  font-weight: 600;
  padding: 0 2px;
}

/* String literals */
.expr-string {
  color: #a31515;
}

/* Control flow expressions - high visibility */
.loop-var {
  display: inline-flex;
  align-items: center;
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

.loop-iterable,
.condition-expr,
.switch-expr,
.case-match {
  display: inline-flex;
  align-items: center;
  font-weight: 700;
  white-space: nowrap;
}

/* Range expressions */
.range-expr {
  display: inline-flex;
  align-items: center;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
}

.range-dots {
  color: var(--text-secondary);
  font-weight: 600;
  padding: 0 1px;
}

.range-keyword {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 10px;
  padding: 0 2px;
}

.range-start,
.range-end {
  display: inline-flex;
  align-items: center;
}

.range-step {
  display: inline-flex;
  align-items: center;
  margin-left: 2px;
}

.range-step-value {
  display: inline-flex;
  align-items: center;
  padding-left: 2px;
}

/* Built-in math functions (min, max) - neutral styling */
.builtin-func {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  color: var(--text-primary);
}

.compact .builtin-func {
  font-size: 9px;
}

/* Comments */
.comment,
.inline-comment {
  color: var(--accent-comment);
  font-style: italic;
  font-size: 11px;
  margin-left: 8px;
  white-space: normal;
  flex: 0 1 auto;
  min-width: 0;
  max-width: 350px;
}

/* Wrapper for blocks with comments - keeps them together when wrapping */
.block-with-comment {
  display: inline-flex;
  align-items: center;
  vertical-align: top;
  max-width: 100%;
  gap: 4px;
}

/* When comment wraps to multiple lines, align to top */
.block-with-comment.comment-wrapped {
  align-items: flex-start;
}

/* Prioritize main content (templates/functions) over comments */
.block-with-comment > .template-block,
.block-with-comment > .func-block,
.block-with-comment > .context-var,
.block-with-comment > .range-expr {
  flex-shrink: 0;
}

.comment-block {
  color: var(--accent-comment);
  font-style: italic;
  padding: 1px 0;
  margin: 1px 0;
  font-size: 12px;
}

/* Name definitions: Name $varname := expr */
.name-def {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  margin: 2px 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
}

.name-var {
  color: var(--text-primary);
  font-weight: 600;
}

.name-assign {
  color: var(--text-primary);
  font-weight: 600;
}

/* Name references: $varname - pink text */
.name-ref {
  color: #ec4899;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 600;
}

/* List comprehensions: [ element | var ∈ iterable ] */
.list-comp-wrapper {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.list-comprehension {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 14px;
}

.list-comp-separator {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  padding: 0 4px;
}

.list-comp-var {
  display: inline-flex;
  align-items: center;
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

.list-comp-in {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  padding: 0 4px;
}

/* ======================================================
   END BLOCK - Conditional early termination
   ====================================================== */

.end-block {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
  padding-right: 10px;
  margin: 4px 0;
  margin-left: -24px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  width: calc(100% + 24px);
}

.end-dashed-line {
  flex-grow: 1;
  height: 2px;
  background: repeating-linear-gradient(
    to right,
    #6e7781 0,
    #6e7781 8px,
    transparent 8px,
    transparent 16px
  );
  min-width: 20px;
  margin-left: 24px;
}

.end-text {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  white-space: nowrap;
}

.end-keyword {
  color: #000000;
  font-weight: 800;
  letter-spacing: 0.3px;
}

.end-block .keyword {
  color: #000000;
  font-weight: 800;
}

.end-block .condition-expr {
  font-weight: 600;
}

/* ======================================================
   CONTROL FLOW BLOCKS
   ====================================================== */

.loop-block-outside-role,
.loop-block-inside-role,
.switch-block-outside-role,
.switch-block-inside-role,
.conditional-block-outside-role,
.conditional-block-inside-role {
  position: relative;
  margin: 5px 0;
  border-radius: 4px;
  padding: 6px 12px 6px 16px;
  border-left: 1px solid var(--control-border);
  overflow: hidden;
}

.conditional-section {
  position: relative;
  margin: 3px 0;
  padding: 4px 10px;
  background: var(--bg-primary);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  overflow: hidden;
}

/* Style control flow blocks inside role blocks to match outside-role style (border-left only) */
.conditional-block-inside-role .conditional-section,
.switch-block-inside-role .switch-case,
.switch-block-inside-role .switch-default {
  background: transparent !important;
  border: none !important;
  border-left: 1px solid var(--control-border) !important;
  border-radius: 0 !important;
}

/* Loop headers */
.loop-block-outside-role-header,
.loop-block-inside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  background: var(--control-header-bg);
}

.loop-block-outside-role-header::before,
.loop-block-inside-role-header::before {
  content: '↻';
  font-size: 12px;
  color: var(--control-border);
  align-items: center;
}

/* Conditional headers (outside role) */
.conditional-block-outside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  background: var(--control-header-bg);
}

.conditional-block-outside-role-header::before {
  content: '◇';
  font-size: 10px;
  color: var(--control-border);
}

/* Conditional headers */
.conditional-section-header,
.conditional-block-inside-role-header,
.conditional-block-outside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  background: var(--control-header-bg);
}

.conditional-section-header::before,
.conditional-block-inside-role-header::before,
.conditional-block-outside-role-header::before {
  content: '◇';
  font-size: 10px;
  color: var(--control-border);
}

/* Switch headers */
.switch-block-outside-role-header,
.switch-block-inside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  background: var(--control-header-bg);
}

.switch-block-outside-role-header::before,
.switch-block-inside-role-header::before {
  content: '⎇';
  font-size: 12px;
  color: var(--control-border);
}

.switch-case,
.switch-default {
  margin: 3px 0;
  padding: 4px 10px;
  overflow: hidden;
  background: var(--bg-primary);
  border: 1px solid var(--border-light);
  border-radius: 4px;
}

.switch-case-header,
.switch-default-header {
  padding: 2px 8px;
  margin: -4px -10px 3px -10px;
  border-radius: 4px 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--control-text);
  white-space: nowrap;
  background: var(--control-header-bg);
}


/* ======================================================
   BLOCK CHILDREN
   ====================================================== */

.block-children {
  padding: 2px 0 2px 12px;
  margin: 2px 0;
}

.conditional-child,
.role-condition-child,
.switch-child,
.role-switch-child,
.loop-child,
.role-loop-child {
  margin: 2px 0;
  padding: 1px 0;
}

/* ======================================================
   LABEL BLOCKS
   ====================================================== */

.label-block {
  margin: 16px 0;
  position: relative;
}

.label-start,
.label-end {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;

}

.label-block-body {
  border-left: 2px solid var(--border-light);
  margin-left: 6px;
  padding-left: 12px;
}

/* ======================================================
   MARK BLOCKS - Right-side bracket with number
   ====================================================== */

.mark-block {
  position: relative;
  margin: 8px 0;
  padding-right: 40px; /* Reserve space for brackets on the right */
  overflow: visible; /* Allow bracket to overflow for nested marks */
}

.mark-block-content {
  min-width: 0;
}

.mark-block-bracket {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
}

.mark-bracket-line {
  display: block;
  width: 8px;
  height: 100%;
  border: 3px solid #000000;
  border-left: none;
  border-radius: 0 4px 4px 0;
  flex-shrink: 0;
}

.mark-bracket-number {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: #000000;
  margin-left: 4px;
  flex-shrink: 0;
  white-space: nowrap;
}

/* Nested mark blocks - all brackets stay at right edge, no negative positioning */
.mark-block .mark-block {
  padding-right: 40px; /* Same as parent - all nested blocks get same padding */
}

.mark-block .mark-block .mark-block-bracket {
  right: 0; /* Keep bracket at right edge of its container, no overflow needed */
}

.mark-block .mark-block .mark-block .mark-block-bracket {
  right: 0;
}

.mark-block .mark-block .mark-block .mark-block .mark-block-bracket {
  right: 0;
}

/* ======================================================
   COLLAPSIBLE BEHAVIOR
   ====================================================== */

.collapsible-header {
  cursor: pointer;
  user-select: none;
}

.collapsible-header:hover {
  opacity: 0.8;
}

.collapsed .block-children,
.collapsed .label-block-body,
.collapsed > .role-body-block {
  display: none;
}

.collapsed .collapsible-header::after {
  content: ' ▸';
  font-size: 10px;
  opacity: 0.6;
}

/* ======================================================

   ====================================================== */

/* ======================================================

   ====================================================== */

/* Compact role messages */
.compact .role-message,

/* Compact name definitions */

.compact .name-var,

.compact .list-comp-separator,

/* Compact control flow blocks */

.compact .switch-block-outside-role,

}

.compact .label-start,

}

    return `<span class="range-expr"><span class="range-start">${startHtml}</span><span class="range-dots">...</span><span class="range-end">${endHtml}</span>${stepHtml}</span>`;
  }
  function renderLoopOutsideRole(block) {
    const indexHtml = `<span class="loop-var">${renderIndexContent(block.index.value)}</span>`;
    const iterableHtml = `<span class="loop-iterable">${renderIterable(block.iterable)}</span>`;
    const header = `<span class="keyword">ForEach</span> ${indexHtml}: ${iterableHtml}`;
    const bodyHtml = block.body.map(
      (child) => `<div class="loop-child">${renderTopLevelBlock(child)}</div>`
    ).join("\n");
    return wrapBlock(
      "loop-block-outside-role",
      header,
      bodyHtml
    );
  }
  function renderLoopInsideRole(block) {
    const indexHtml = `<span class="loop-var">${renderIndexContent(block.index.value)}</span>`;
    const iterableHtml = `<span class="loop-iterable">${renderIterable(block.iterable)}</span>`;
    const header = `<span class="keyword">ForEach</span> ${indexHtml}: ${iterableHtml}`;
    const bodyHtml = block.body.map(
      (child) => `<div class="role-loop-child">${renderRoleBuildingBlock(child)}</div>`
    ).join("\n");
    return wrapBlock("loop-block-inside-role", header, bodyHtml);
  }
  function renderSwitchOutsideRole(block) {
    const exprHtml = `<span class="switch-expr">${renderExpressionTokens(block.expression)}</span>`;
    const header = `<span class="keyword">Switch</span>(${exprHtml}):`;
    const casesHtml = block.cases.map((c) => {
      const bodyHtml = c.body.map(
        (child) => `<div class="switch-child">${renderTopLevelBlock(child)}</div>`
      ).join("\n");
      return wrapBlock(
        "switch-case",
        `<span class="keyword">Case</span> <span class="case-match">${renderExpressionTokens(c.match)}</span>:`,
        bodyHtml
      );
    }).join("\n");
    const defaultHtml = block.defaultCase ? (() => {
      const bodyHtml = block.defaultCase.body.map(
        (child) => `<div class="switch-child">${renderTopLevelBlock(child)}</div>`
      ).join("\n");
      return wrapBlock(
        "switch-default",
        `<span class="keyword">Default</span>:`,
        bodyHtml
      );
    })() : "";
    return wrapBlock(
      "switch-block-outside-role",
      header,
      `${casesHtml}${defaultHtml}`
    );
  }
  function renderSwitchInsideRole(block) {
    const exprHtml = `<span class="switch-expr">${renderExpressionTokens(block.expression)}</span>`;
    const header = `<span class="keyword">Switch</span>(${exprHtml}):`;
    const casesHtml = block.cases.map((c) => {
      const bodyHtml = c.body.map(
        (child) => `<div class="role-switch-child">${renderRoleBuildingBlock(child)}</div>`
      ).join("\n");
      return wrapBlock(
        "switch-case",
        `<span class="keyword">Case</span> <span class="case-match">${renderExpressionTokens(c.match)}</span>:`,
        bodyHtml
      );
    }).join("\n");
    const defaultHtml = block.defaultCase ? (() => {
      const bodyHtml = block.defaultCase.body.map(
        (child) => `<div class="role-switch-child">${renderRoleBuildingBlock(child)}</div>`
      ).join("\n");
      return wrapBlock(
        "switch-default",
        `<span class="keyword">Default</span>:`,
        bodyHtml
      );
    })() : "";
    return wrapBlock(
      "switch-block-inside-role",
      header,
      `${casesHtml}${defaultHtml}`
    );
  }
  function renderConditionalInsideRole(block) {
    const renderBody = (body) => body.map(
      (child) => `<div class="role-condition-child">${renderRoleBuildingBlock(child)}</div>`
    ).join("\n");
    const ifHeader = `<span class="keyword">If</span> <span class="condition-expr">${renderExpressionTokens(block.Ifcondition)}</span>:`;
    let result = wrapBlock("conditional-block-inside-role", ifHeader, renderBody(block.IfBody));
    for (let i = 0; i < block.elseif.length; i++) {
      const elseifHeader = `<span class="keyword">ElseIf</span> <span class="condition-expr">${renderExpressionTokens(block.elseif[i])}</span>:`;
      result += wrapBlock("conditional-block-inside-role", elseifHeader, renderBody(block.elseifBody[i]));
    }
    if (block.elseBody && block.elseBody.length > 0) {
      const elseHeader = `<span class="keyword">Else</span>:`;
      result += wrapBlock("conditional-block-inside-role", elseHeader, renderBody(block.elseBody));
    }
    return result;
  }
  function renderConditionalOutsideRole(block) {
    const renderBody = (body) => body.map(
      (child) => `<div class="conditional-child">${renderTopLevelBlock(child)}</div>`
    ).join("\n");
    const ifHeader = `<span class="keyword">If</span> <span class="condition-expr">${renderExpressionTokens(block.Ifcondition)}</span>:`;

      result += wrapBlock("conditional-block-outside-role", elseHeader, renderBody(block.elseBody));

  <script>
// Extract Parser and renderPrompt from the bundle
const { Parser, renderPrompts } = ACDL;

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function enableCollapsibleBlocks() {
  const headers = document.querySelectorAll(
    ".role-message-header, " +
    ".loop-block-outside-role-header, .loop-block-inside-role-header, " +
    ".switch-block-outside-role-header, .switch-block-inside-role-header, " +
    ".conditional-section-header"
  );
  headers.forEach((header) => {
    const container = header.parentElement;
    if (!container) return;
    header.classList.add("collapsible-header");
    const newHeader = header.cloneNode(true);
    header.parentNode.replaceChild(newHeader, header);
    newHeader.addEventListener("click", () => { container.classList.toggle("collapsed"); });
  });
}

function detectWrappedComments(container) {
  const blockWithComments = container.querySelectorAll('.block-with-comment');
  blockWithComments.forEach(el => {
    const comment = el.querySelector('.inline-comment, .comment');
    if (comment) {
      const lineHeight = parseFloat(getComputedStyle(comment).lineHeight) || 16;
      if (comment.offsetHeight > lineHeight * 1.5) {
        el.classList.add('comment-wrapped');
      } else {
        el.classList.remove('comment-wrapped');
      }
    }
  });
}

function doRender() {
  const input = document.getElementById("acdl-editor").value;
  const output = document.getElementById("output");
  if (!input.trim()) {
    output.innerHTML = '<div class="info-msg">Enter ACDL code and click "Render Visualization"</div>';
    return;
  }
  try {
    const parser = new Parser(input);
    const ast = parser.parseFile();
    const html = renderPrompts(ast);
    output.innerHTML = html;
    enableCollapsibleBlocks();
    detectWrappedComments(output);
  } catch (err) {
    output.innerHTML = '<div class="error-msg">' + escapeHtml(err.message) + '</div>';
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const sidebar = document.getElementById("sidebar");
  const resizer = document.getElementById("resizer");
  const outputWrapper = document.getElementById("output-wrapper");
  const collapseSidebar = document.getElementById("collapse-sidebar");
  const collapseOutput = document.getElementById("collapse-output");
  const restoreSidebar = document.getElementById("restore-sidebar");
  const restoreOutput = document.getElementById("restore-output");
  const promptSelect = document.getElementById("prompt-select");
  const editor = document.getElementById("acdl-editor");
  const renderBtn = document.getElementById("render-btn");
  const output = document.getElementById("output");
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("acdl-upload");

  let isResizing = false;
  let lastSidebarWidth = 420;

  // File upload handling
  function handleFile(file) {
    if (!file.name.endsWith(".acdl")) {
      alert("Please select a .acdl file");
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      editor.value = e.target.result;
      promptSelect.value = "";
      doRender();
    };
    reader.onerror = () => { alert("Error reading file"); };
    reader.readAsText(file);
  }

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
    fileInput.value = "";
  });

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("hover");
  });

  dropZone.addEventListener("dragleave", (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("hover");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("hover");
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  promptSelect.addEventListener("change", () => {
    const key = promptSelect.value;
    if (key && PROMPTS[key]) {
      editor.value = PROMPTS[key];
      doRender();
    }
  });

  renderBtn.addEventListener("click", doRender);

  // Tab key handling for editor - insert spaces instead of moving focus
  editor.addEventListener("keydown", (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + "  " + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
    }
  });

  // Resizer
  resizer.addEventListener("mousedown", (e) => {
    isResizing = true;
    document.body.classList.add("resizing");
    resizer.classList.add("dragging");
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const containerRect = document.querySelector(".main-container").getBoundingClientRect();
    const newSidebarWidth = e.clientX - containerRect.left;
    const minWidth = 200;
    const maxWidth = containerRect.width - 250;
    if (newSidebarWidth >= minWidth && newSidebarWidth <= maxWidth) {
      sidebar.style.width = newSidebarWidth + "px";
      lastSidebarWidth = newSidebarWidth;
    }
  });

  document.addEventListener("mouseup", () => {
    if (isResizing) {
      isResizing = false;
      document.body.classList.remove("resizing");
      resizer.classList.remove("dragging");
    }
  });

  // Collapse/expand
  collapseSidebar.addEventListener("click", () => {
    sidebar.classList.add("collapsed");
    restoreSidebar.style.display = "block";
  });

  restoreSidebar.addEventListener("click", () => {
    sidebar.classList.remove("collapsed");
    sidebar.style.width = lastSidebarWidth + "px";
    restoreSidebar.style.display = "none";
  });

  collapseOutput.addEventListener("click", () => {
    outputWrapper.classList.add("collapsed");
    restoreOutput.style.display = "block";
  });

  restoreOutput.addEventListener("click", () => {
    outputWrapper.classList.remove("collapsed");
    restoreOutput.style.display = "none";
  });

  // Export functionality
  const exportBtn = document.getElementById("export-btn");
  const exportMenu = document.getElementById("export-menu");
  const exportPng = document.getElementById("export-png");
  const exportPdf = document.getElementById("export-pdf");

  exportBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    exportMenu.classList.toggle("show");
  });

  document.addEventListener("click", () => { exportMenu.classList.remove("show"); });

  // Helper to find the widest line of content (excluding comments)
  function findWidestLineWidth(container) {
    const lineElements = [];

    // Prompt titles
    container.querySelectorAll('.prompt-title h1').forEach(el => lineElements.push(el));

    // Role body blocks - each child is a line
    container.querySelectorAll('.role-body-block').forEach(block => {
      Array.from(block.children).forEach(child => {
        if (child.classList.contains('block-with-comment')) {
          const mainContent = child.firstElementChild;
          if (mainContent) lineElements.push(mainContent);
        } else if (!child.classList.contains('comment') && !child.classList.contains('inline-comment')) {
          lineElements.push(child);
        }
      });
    });

    // Control flow headers
    container.querySelectorAll('.loop-block-outside-role-header, .loop-block-inside-role-header, .conditional-block-outside-role-header, .conditional-section-header, .switch-block-outside-role-header, .switch-block-inside-role-header, .switch-case-header, .switch-default-header').forEach(el => lineElements.push(el));

    // Name definitions
    container.querySelectorAll('.name-def').forEach(el => lineElements.push(el));

    // End blocks
    container.querySelectorAll('.end-block').forEach(el => lineElements.push(el));

    // Label starts/ends
    container.querySelectorAll('.label-start, .label-end').forEach(el => lineElements.push(el));

    let maxWidth = 0;
    lineElements.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.width > maxWidth) maxWidth = rect.width;
    });

    return maxWidth;
  }

  // Helper function to capture full content
  async function captureFullContent() {
    if (!output.querySelector(".prompt-container")) return null;

    const content = output;

    // Store original styles for all affected elements
    const originalOutputStyle = output.style.cssText;
    const originalContentStyle = content.style.cssText;
    const originalWrapperStyle = outputWrapper.style.cssText;
    const originalBodyStyle = document.body.style.cssText;

    // Temporarily remove all constraints to allow full content measurement
    output.style.overflow = "visible";
    output.style.height = "auto";
    output.style.maxHeight = "none";
    output.style.position = "relative";
    outputWrapper.style.overflow = "visible";
    outputWrapper.style.height = "auto";
    document.body.style.overflow = "visible";

    // html2canvas doesn't render text inside inline-flex elements properly
    const inlineFlexEls = content.querySelectorAll(".context-var, .template-block, .func-block, .expr-context-var");
    const savedDisplays = [];
    inlineFlexEls.forEach(el => {
      savedDisplays.push(el.style.display);
      el.style.display = "inline-block";
    });

    // Fix mark blocks - html2canvas has issues with absolute positioning
    const markBlocks = content.querySelectorAll(".mark-block");
    const savedMarkBlockStyles = [];
    markBlocks.forEach(el => {
      savedMarkBlockStyles.push(el.style.cssText);
      el.style.display = "flex";
      el.style.alignItems = "stretch";
      el.style.paddingRight = "0";
    });

    const markBrackets = content.querySelectorAll(".mark-block-bracket");
    const savedMarkBracketStyles = [];
    markBrackets.forEach(el => {
      savedMarkBracketStyles.push(el.style.cssText);
      el.style.position = "relative";
      el.style.right = "auto";
      el.style.top = "auto";
      el.style.bottom = "auto";
      el.style.marginLeft = "8px";
    });

    const markContents = content.querySelectorAll(".mark-block-content");
    const savedMarkContentStyles = [];
    markContents.forEach(el => {
      savedMarkContentStyles.push(el.style.cssText);
      el.style.flex = "1";
    });

    // Fix time-index and other-index elements
    const timeIndexEls = content.querySelectorAll(".time-index, .other-index");
    const savedTimeIndexStyles = [];
    timeIndexEls.forEach(el => {
      savedTimeIndexStyles.push(el.style.cssText);
      el.style.display = "inline";
      el.style.color = "#0969da";
      el.style.fontWeight = "700";
      el.style.fontFamily = "'JetBrains Mono', 'SF Mono', monospace";
    });

    // Fix title to prevent wrapping
    const titleH1s = content.querySelectorAll(".prompt-title h1");
    const savedTitleStyles = [];
    titleH1s.forEach(el => {
      savedTitleStyles.push(el.style.cssText);
      el.style.whiteSpace = "nowrap";
    });

    // Add export fix style for template-block pseudo-elements
    const exportFixStyle = document.createElement("style");
    exportFixStyle.textContent = `
      .template-block::before {
        vertical-align: middle;
        line-height: 1;
        position: relative;
        top: -1px;
      }
    `;
    document.head.appendChild(exportFixStyle);

    // Remove max-width constraints on containers
    const containers = content.querySelectorAll('.prompt-container');
    const savedContainerStyles = [];
    containers.forEach(el => {
      savedContainerStyles.push(el.style.cssText);
      el.style.maxWidth = 'none';
      el.style.width = 'auto';
    });

    // Step 1: Hide comments and measure natural line widths
    const comments = content.querySelectorAll('.comment, .inline-comment');
    comments.forEach(c => c.style.display = 'none');

    content.offsetHeight;

    const widestLineWidth = findWidestLineWidth(content);
    const contentWidthWithoutComments = Math.ceil(widestLineWidth) + 60;

    // Step 2: Restore comments and constrain width so they wrap
    comments.forEach(c => c.style.display = '');
    const constrainedWidth = Math.min(Math.max(contentWidthWithoutComments, 200), 450);

    containers.forEach(el => {
      el.style.width = (constrainedWidth - 40) + 'px';
      el.style.maxWidth = (constrainedWidth - 40) + 'px';
    });
    content.style.width = constrainedWidth + 'px';
    content.style.minWidth = "200px";

    // Calculate available width for comments
    const blockWithComments = content.querySelectorAll('.block-with-comment');
    const savedBlockStyles = [];
    const savedCommentStyles = [];
    blockWithComments.forEach(el => {
      savedBlockStyles.push({ el, style: el.style.cssText, hadClass: el.classList.contains('comment-wrapped') });
      const mainContent = el.firstElementChild;
      const comment = el.querySelector('.inline-comment, .comment');
      if (mainContent && comment) {
        savedCommentStyles.push({ el: comment, style: comment.style.cssText });
        const mainWidth = mainContent.getBoundingClientRect().width;
        const gap = 8;
        const availableForComment = constrainedWidth - 40 - mainWidth - gap;
        const commentMaxWidth = Math.max(80, availableForComment);
        comment.style.maxWidth = commentMaxWidth + 'px';
        comment.style.minWidth = '0';
        comment.style.flex = '0 1 auto';
        comment.style.whiteSpace = 'normal';
        comment.style.overflowWrap = 'break-word';
      }
    });

    content.offsetHeight;

    // Detect wrapped comments and add class for top alignment
    blockWithComments.forEach(el => {
      const comment = el.querySelector('.inline-comment, .comment');
      if (comment) {
        const lineHeight = parseFloat(getComputedStyle(comment).lineHeight) || 16;
        if (comment.offsetHeight > lineHeight * 1.5) {
          el.classList.add('comment-wrapped');
        } else {
          el.classList.remove('comment-wrapped');
        }
      }
    });

    // Step 3: Get final dimensions
    const fullWidth = Math.max(
      content.scrollWidth,
      content.offsetWidth,
      content.getBoundingClientRect().width
    );
    const fullHeight = Math.max(
      content.scrollHeight,
      content.offsetHeight,
      content.getBoundingClientRect().height
    );

    const captureWidth = Math.ceil(fullWidth) + 40;
    const captureHeight = Math.ceil(fullHeight) + 60;

    try {
      const canvas = await html2canvas(content, {
        backgroundColor: "#ffffff",
        scale: window.devicePixelRatio * 2 || 3,
        useCORS: true,
        logging: false,
        width: captureWidth,
        height: captureHeight,
        windowWidth: captureWidth,
        windowHeight: captureHeight,
        scrollX: 0,
        scrollY: 0,
        x: 0,
        y: 0,
        allowTaint: true,
        imageTimeout: 0,
        onclone: (clonedDoc) => {
          const styles = document.querySelectorAll('link[rel="stylesheet"], style');
          styles.forEach(style => {
            clonedDoc.head.appendChild(style.cloneNode(true));
          });
        }
      });
      return canvas;
    } finally {
      // Restore all styles
      inlineFlexEls.forEach((el, i) => { el.style.display = savedDisplays[i]; });
      markBlocks.forEach((el, i) => { el.style.cssText = savedMarkBlockStyles[i]; });
      markBrackets.forEach((el, i) => { el.style.cssText = savedMarkBracketStyles[i]; });
      markContents.forEach((el, i) => { el.style.cssText = savedMarkContentStyles[i]; });
      savedBlockStyles.forEach(({ el, style, hadClass }) => {
        el.style.cssText = style;
        if (hadClass) el.classList.add('comment-wrapped');
        else el.classList.remove('comment-wrapped');
      });
      savedCommentStyles.forEach(({ el, style }) => { el.style.cssText = style; });
      timeIndexEls.forEach((el, i) => { el.style.cssText = savedTimeIndexStyles[i]; });
      titleH1s.forEach((el, i) => { el.style.cssText = savedTitleStyles[i]; });
      containers.forEach((el, i) => { el.style.cssText = savedContainerStyles[i]; });
      exportFixStyle.remove();
      output.style.cssText = originalOutputStyle;
      content.style.cssText = originalContentStyle;
      outputWrapper.style.cssText = originalWrapperStyle;
      document.body.style.cssText = originalBodyStyle;
    }
  }

  // Helper to capture all content (entire output with multiple prompts)
  async function captureAllContent() {
    if (!output.querySelector(".prompt-container")) return null;

    const originalOutputStyle = output.style.cssText;
    const originalWrapperStyle = outputWrapper.style.cssText;
    const originalBodyStyle = document.body.style.cssText;

    output.style.overflow = "visible";
    output.style.height = "auto";
    output.style.maxHeight = "none";
    output.style.position = "relative";
    outputWrapper.style.overflow = "visible";
    outputWrapper.style.height = "auto";
    document.body.style.overflow = "visible";

    const inlineFlexEls = output.querySelectorAll(".context-var, .template-block, .func-block, .expr-context-var");
    const savedDisplays = [];
    inlineFlexEls.forEach(el => {
      savedDisplays.push(el.style.display);
      el.style.display = "inline-block";
    });

    const markBlocks = output.querySelectorAll(".mark-block");
    const savedMarkBlockStyles = [];
    markBlocks.forEach(el => {
      savedMarkBlockStyles.push(el.style.cssText);
      el.style.display = "flex";
      el.style.alignItems = "stretch";
      el.style.paddingRight = "0";
    });

    const markBrackets = output.querySelectorAll(".mark-block-bracket");
    const savedMarkBracketStyles = [];
    markBrackets.forEach(el => {
      savedMarkBracketStyles.push(el.style.cssText);
      el.style.position = "relative";
      el.style.right = "auto";
      el.style.top = "auto";
      el.style.bottom = "auto";
      el.style.marginLeft = "8px";
    });

    const markContents = output.querySelectorAll(".mark-block-content");
    const savedMarkContentStyles = [];
    markContents.forEach(el => {
      savedMarkContentStyles.push(el.style.cssText);
      el.style.flex = "1";
    });

    const timeIndexEls = output.querySelectorAll(".time-index, .other-index");
    const savedTimeIndexStyles = [];
    timeIndexEls.forEach(el => {
      savedTimeIndexStyles.push(el.style.cssText);
      el.style.display = "inline";
      el.style.color = "#0969da";
      el.style.fontWeight = "700";
      el.style.fontFamily = "'JetBrains Mono', 'SF Mono', monospace";
    });

    const titleH1s = output.querySelectorAll(".prompt-title h1");
    const savedTitleStyles = [];
    titleH1s.forEach(el => {
      savedTitleStyles.push(el.style.cssText);
      el.style.whiteSpace = "nowrap";
    });

    const exportFixStyle = document.createElement("style");
    exportFixStyle.textContent = `
      .template-block::before {
        vertical-align: middle;
        line-height: 1;
        position: relative;
        top: -1px;
      }
    `;
    document.head.appendChild(exportFixStyle);

    const containers = output.querySelectorAll('.prompt-container');
    const savedContainerStyles = [];
    containers.forEach(el => {
      savedContainerStyles.push(el.style.cssText);
      el.style.maxWidth = 'none';
      el.style.width = 'auto';
    });

    const comments = output.querySelectorAll('.comment, .inline-comment');
    comments.forEach(c => c.style.display = 'none');

    output.offsetHeight;

    const widestLineWidth = findWidestLineWidth(output);
    const contentWidthWithoutComments = Math.ceil(widestLineWidth) + 60;

    comments.forEach(c => c.style.display = '');
    const savedOutputWidth = output.style.width;
    const constrainedWidth = Math.min(Math.max(contentWidthWithoutComments, 200), 450);

    containers.forEach(el => {
      el.style.width = (constrainedWidth - 40) + 'px';
      el.style.maxWidth = (constrainedWidth - 40) + 'px';
    });
    output.style.width = constrainedWidth + 'px';

    const blockWithComments = output.querySelectorAll('.block-with-comment');
    const savedBlockStyles = [];
    const savedCommentStyles = [];
    blockWithComments.forEach(el => {
      savedBlockStyles.push({ el, style: el.style.cssText, hadClass: el.classList.contains('comment-wrapped') });
      const mainContent = el.firstElementChild;
      const comment = el.querySelector('.inline-comment, .comment');
      if (mainContent && comment) {
        savedCommentStyles.push({ el: comment, style: comment.style.cssText });
        const mainWidth = mainContent.getBoundingClientRect().width;
        const gap = 8;
        const availableForComment = constrainedWidth - 40 - mainWidth - gap;
        const commentMaxWidth = Math.max(80, availableForComment);
        comment.style.maxWidth = commentMaxWidth + 'px';
        comment.style.minWidth = '0';
        comment.style.flex = '0 1 auto';
        comment.style.whiteSpace = 'normal';
        comment.style.overflowWrap = 'break-word';
      }
    });

    output.offsetHeight;

    blockWithComments.forEach(el => {
      const comment = el.querySelector('.inline-comment, .comment');
      if (comment) {
        const lineHeight = parseFloat(getComputedStyle(comment).lineHeight) || 16;
        if (comment.offsetHeight > lineHeight * 1.5) {
          el.classList.add('comment-wrapped');
        } else {
          el.classList.remove('comment-wrapped');
        }
      }
    });

    const fullWidth = Math.max(
      output.scrollWidth,
      output.offsetWidth,
      output.getBoundingClientRect().width
    );
    const fullHeight = Math.max(
      output.scrollHeight,
      output.offsetHeight,
      output.getBoundingClientRect().height
    );

    const captureWidth = Math.ceil(fullWidth) + 40;
    const captureHeight = Math.ceil(fullHeight) + 60;

    try {
      const canvas = await html2canvas(output, {
        backgroundColor: "#ffffff",
        scale: window.devicePixelRatio * 2 || 3,
        useCORS: true,
        logging: false,
        width: captureWidth,
        height: captureHeight,
        windowWidth: captureWidth,
        windowHeight: captureHeight,
        scrollX: 0,
        scrollY: 0,
        x: 0,
        y: 0,
        allowTaint: true,
        imageTimeout: 0
      });
      return canvas;
    } finally {
      inlineFlexEls.forEach((el, i) => { el.style.display = savedDisplays[i]; });
      markBlocks.forEach((el, i) => { el.style.cssText = savedMarkBlockStyles[i]; });
      markBrackets.forEach((el, i) => { el.style.cssText = savedMarkBracketStyles[i]; });
      markContents.forEach((el, i) => { el.style.cssText = savedMarkContentStyles[i]; });
      timeIndexEls.forEach((el, i) => { el.style.cssText = savedTimeIndexStyles[i]; });
      titleH1s.forEach((el, i) => { el.style.cssText = savedTitleStyles[i]; });
      containers.forEach((el, i) => { el.style.cssText = savedContainerStyles[i]; });
      savedBlockStyles.forEach(({ el, style, hadClass }) => { el.style.cssText = style; if (hadClass) el.classList.add('comment-wrapped'); else el.classList.remove('comment-wrapped'); });
      savedCommentStyles.forEach(({ el, style }) => { el.style.cssText = style; });
      exportFixStyle.remove();
      output.style.cssText = originalOutputStyle;
      outputWrapper.style.cssText = originalWrapperStyle;
      document.body.style.cssText = originalBodyStyle;
    }
  }

  exportPng.addEventListener("click", async () => {
    exportMenu.classList.remove("show");
    if (!output.querySelector(".prompt-container")) {
      alert("No visualization to export. Please render a prompt first.");
      return;
    }
    exportBtn.classList.add("loading");
    try {
      const canvas = await captureAllContent();
      if (!canvas) throw new Error("Failed to capture content");
      const link = document.createElement("a");
      link.download = "acdl-visualization.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    } catch (error) {
      console.error("Export failed:", error);
      alert("Failed to export PNG. Please try again.");
    } finally {
      exportBtn.classList.remove("loading");
    }
  });

  exportPdf.addEventListener("click", async () => {
    exportMenu.classList.remove("show");
    if (!output.querySelector(".prompt-container")) {
      alert("No visualization to export. Please render a prompt first.");
      return;
    }
    exportBtn.classList.add("loading");
    try {
      const canvas = await captureAllContent();
      if (!canvas) throw new Error("Failed to capture content");
      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL("image/png");
      const imgWidth = canvas.width;
      const imgHeight = canvas.height;
      const pdfWidth = Math.max(210, (imgWidth / 2) * 0.264583);
      const pdfHeight = (imgHeight / imgWidth) * pdfWidth;
      const pdf = new jsPDF({
        orientation: pdfWidth > pdfHeight ? "landscape" : "portrait",
        unit: "mm",
        format: [pdfWidth, pdfHeight]
      });
      pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
      pdf.save("acdl-visualization.pdf");
    } catch (error) {
      console.error("Export failed:", error);
      alert("Failed to export PDF. Please try again.");
    } finally {
      exportBtn.classList.remove("loading");
    }
  });
});
  </script>
