<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ACDL Prompt Visualizer - Standalone</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
/* ======================================================
   ACDL PROMPT VISUALIZER - ACADEMIC PAPER STYLE
   Clean, professional design for research publications
   ====================================================== */

:root {
  /* Light, professional color palette */
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-tertiary: #f1f3f4;

  --border-light: #e1e4e8;
  --border-medium: #d0d7de;
  --border-dark: #b0b8c1;

  --text-primary: #1f2328;
  --text-secondary: #57606a;
  --text-muted: #8b949e;

  /* Role colors - professional, muted tones */
  --system-bg: #f0f7ff;
  --system-border: #0969da;
  --system-text: #0550ae;
  
  --assistant-bg: #e6fafa;
  --assistant-border: #1acad1;
  --assistant-text: #0a9196;

  --tool-bg: #ffebe6;
  --tool-border: #f7660b;
  --tool-text: #800d00;

  --user-bg: #fff8e6;
  --user-border: #e5990b;
  --user-text: #805600;

  --none-bg: #f5f5f5;
  --none-border: #6e7781;
  --none-text: #57606a;

  /* Control flow colors - subtle blue-gray */
  --control-bg: #f6f8fa;
  --control-border: #6e7781;
  --control-text: #57606a;
  --control-header-bg: #eaeef2;

  /* Accent colors for inline elements */
  --accent-template: #9333ea;
  --accent-template-bg: #faf5ff;
  /* Functions - purple */
  --accent-function: #9333ea;
  --accent-function-bg: #faf5ff;
  /* Context variables - teal */
  --accent-context: #0da66b;
  --accent-context-bg: #e0ffdd;
  /* Variables (all indexes, iterables) - light blue */
  --accent-variable: #0969da;
  --accent-variable-bg: rgba(9, 105, 218, 0.12);

  /* Legacy aliases for backwards compatibility */
  --accent-index: var(--accent-variable);
  --accent-index-bg: var(--accent-variable-bg);
  --accent-other-index: var(--accent-variable);
  --accent-other-index-bg: var(--accent-variable-bg);
  --accent-expr: #c2410c;
  --accent-expr-bg: rgba(251, 146, 60, 0.15);
  --accent-expr-border: #ea580c;
  --accent-comment: #6e7781;
}

/* ======================================================
   GLOBAL STYLES
   ====================================================== */

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 40px;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
}

* {
  box-sizing: border-box;
}

/* ======================================================
   PROMPT CONTAINER
   ====================================================== */

.prompt-container {
  display: inline-block;
  max-width: 900px;
  margin: 0 auto;
  position: relative;
  padding-left: 24px;
  border-left: 2px solid var(--border-medium);
}

/* ======================================================
   PROMPT TITLE
   ====================================================== */

.prompt-title {
  background: var(--bg-secondary);
  border: 1px solid var(--border-medium);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 16px;
  margin-left: -24px;
  padding-left: 24px;
}

.prompt-title h1 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
  white-space: nowrap;
}

/* Ensure time-index is visible in title */
.prompt-title .time-index {
  display: inline;
  font-size: inherit;
  color: var(--accent-variable);
  font-weight: 700;
}

/* ======================================================
   ROLE MESSAGES
   ====================================================== */

.role-message {
  border: none;
  border-left: 1px solid var(--border-medium);
  border-radius: 0;
  margin: 4px 0;
  position: relative;
  overflow: hidden;
}

.role-message.system {
  border-left-color: var(--system-border);
}

.role-message.user {
  border-left-color: var(--user-border);
}

.role-message.assistant {
  border-left-color: var(--assistant-border);
}

.role-message.tool {
  border-left-color: var(--tool-border);
}

/* Role header badge - compact badge that wraps text */
.role-message-header {
  display: inline-block;
  padding: 2px 12px;
  margin: 4px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-radius: 4px;
}

.role-message.system .role-message-header {
  background: var(--system-border);
  color: white;
}

.role-message.user .role-message-header {
  background: var(--user-border);
  color: white;
}

.role-message.assistant .role-message-header {
  background: var(--assistant-border);
  color: white;
}

.role-message.tool .role-message-header {
  background: var(--tool-border);
  color: white;
}

/* ======================================================
   NONE/COMPLETION PROMPT MESSAGE
   ====================================================== */

.none-message {
  border: 1px solid var(--none-border);
  border-radius: 6px;
  margin: 4px 0;
  position: relative;
  overflow: hidden;
}

.none-message:hover {
  border-color: var(--border-dark);
}

.none-message-header {
  display: inline-block;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-radius: 0 0 4px 0;
  background: var(--none-border);
  color: white;
}

.role-body-block {
  padding: 2px 12px;
  overflow-x: auto;
  white-space: nowrap;
}

/* ======================================================
   INLINE ELEMENTS - Templates, Functions, Variables
   ====================================================== */

.template-block {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-template-bg);
  border: 1px solid var(--accent-template);
  color: var(--accent-template);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
}

.template-block::before {
  content: '◆';
  font-size: 6px;
  opacity: 0.7;
}

.func-block {
  display: inline-flex;
  align-items: center;
  background: var(--accent-function-bg);
  border: 1px solid var(--accent-function);
  color: var(--accent-function);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
}

.func-name {
  font-weight: 600;
}

.func-parens {
  color: var(--accent-function);
  opacity: 0.7;
}

.context-var {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--accent-context-bg);
  border: 1px solid var(--accent-context);
  color: var(--accent-context);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
}

.context-var .segment {
  color: var(--accent-context);
}

.context-var .segment.base {
  font-weight: 600;
}

/* Environment variables (env.*) - teal styling */
.context-var.context-var-env {
  background: var(--accent-context-bg);
  border-color: var(--accent-context);
  color: var(--accent-context);
}

.context-var.context-var-env .segment {
  color: var(--accent-context);
}

/* Indices - All variables use light blue, no background */
.time-index {
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
}

/* Ensure time-index is styled correctly even when nested inside context-var */
.context-var .time-index,
.context-var .segment .time-index,
.context-var-env .time-index,
.context-var-env .segment .time-index,
.expr-context-var .time-index {
  color: var(--accent-variable);
}

.other-index {
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
}

/* Control flow keywords - bold and prominent */
.keyword {
  color: #000000;
  font-weight: 800;
  letter-spacing: 0.3px;
}

/* ======================================================
   EXPRESSION TOKENS - Inside conditions, iterables, switches
   ====================================================== */

/* Context vars in expressions (env.foo, sys.bar(x), etc.) - green with box */
.expr-context-var {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--accent-context-bg);
  border: 1px solid var(--accent-context);
  color: var(--accent-context);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 500;
}

/* Namespace keywords (env, sys, resp, prompt) - green like context vars */
.expr-namespace {
  color: var(--accent-context);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Identifiers in expressions - light blue like all variables */
.expr-ident {
  color: var(--accent-variable);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Numbers in expressions - light blue like all variables */
.expr-number {
  color: var(--accent-variable);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Logical keywords in expressions (and, or) */
.expr-keyword {
  color: var(--text-primary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Symbols like . [ ] , */
.expr-symbol {
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* @ symbol for time indices - light blue */
.expr-at {
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Logical operators (=, !, <, >, &, |, ^) */
.expr-logic-op {
  color: var(--text-primary);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-variant-ligatures: none;
  padding: 0 2px;
}

/* Arithmetic operators (+, -, *, /, %) */
.expr-arith-op {
  color: var(--text-primary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  padding: 0 1px;
}

/* Range operators (... or …) */
.expr-range {
  color: var(--text-secondary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  padding: 0 2px;
}

/* String literals */
.expr-string {
  color: #a31515;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

/* Control flow expressions - high visibility */
.loop-var {
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

.loop-iterable,
.condition-expr,
.switch-expr,
.case-match {
  display: inline-flex;
  align-items: center;
  font-weight: 700;
  white-space: nowrap;
}

/* Range expressions */
.range-expr {
  display: inline-flex;
  align-items: center;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
}

.range-dots {
  color: var(--text-secondary);
  font-weight: 600;
  padding: 0 2px;
}

.range-keyword {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 10px;
  padding: 0 4px;
}

/* Built-in math functions (min, max) - neutral styling */
.builtin-func {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  color: var(--text-primary);
}

.compact .builtin-func {
  font-size: 9px;
}

/* Comments */
.comment,
.inline-comment {
  color: var(--accent-comment);
  font-style: italic;
  font-size: 11px;
  margin-left: 8px;
  white-space: normal;
  flex: 0 1 auto;
  min-width: 0;
  max-width: 350px;
}

/* Wrapper for blocks with comments - keeps them together when wrapping */
.block-with-comment {
  display: inline-flex;
  align-items: center;
  vertical-align: top;
  max-width: 100%;
}

.comment-block {
  color: var(--accent-comment);
  font-style: italic;
  padding: 1px 0;
  margin: 1px 0;
  font-size: 12px;
}

/* Name definitions: Name $varname := expr */
.name-def {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  margin: 2px 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
}

.name-var {
  color: var(--text-primary);
  font-weight: 600;
}

.name-assign {
  color: var(--text-primary);
  font-weight: 600;
}

/* Name references: $varname - pink text */
.name-ref {
  color: #ec4899;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  font-weight: 600;
}

/* List comprehensions: [ element | var ∈ iterable ] */
.list-comp-wrapper {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.list-comprehension {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 14px;
}

.list-comp-separator {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  padding: 0 4px;
}

.list-comp-var {
  display: inline-flex;
  align-items: center;
  color: var(--accent-variable);
  font-weight: 700;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
}

.list-comp-in {
  display: inline-flex;
  align-items: center;
  color: var(--text-primary);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  padding: 0 4px;
}

/* ======================================================
   CONTROL FLOW BLOCKS
   ====================================================== */

.loop-block-outside-role,
.loop-block-inside-role,
.switch-block-outside-role,
.switch-block-inside-role,
.conditional-block-outside-role,
.conditional-block-inside-role {
  position: relative;
  margin: 5px 0;
  border-radius: 4px;
  padding: 6px 12px 6px 16px;
  border-left: 1px solid var(--control-border);
  overflow: hidden;
}

.conditional-section {
  position: relative;
  margin: 3px 0;
  padding: 4px 10px;
  background: var(--bg-primary);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  overflow: hidden;
}

/* Style control flow blocks inside role blocks to match outside-role style (border-left only) */
.conditional-block-inside-role .conditional-section,
.switch-block-inside-role .switch-case,
.switch-block-inside-role .switch-default {
  background: transparent !important;
  border: none !important;
  border-left: 1px solid var(--control-border) !important;
  border-radius: 0 !important;
}

/* Loop headers */
.loop-block-outside-role-header,
.loop-block-inside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.loop-block-outside-role-header::before,
.loop-block-inside-role-header::before {
  content: '↻';
  font-size: 12px;
  color: var(--control-border);
}

/* Conditional headers (outside role) */
.conditional-block-outside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.conditional-block-outside-role-header::before {
  content: '◇';
  font-size: 10px;
  color: var(--control-border);
}

/* Conditional headers */
.conditional-section-header {
  padding: 3px 10px;
  margin: -4px -10px 3px -10px;
  border-radius: 4px 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.conditional-section-header::before {
  content: '◇';
  font-size: 10px;
  color: var(--control-border);
}

/* Switch headers */
.switch-block-outside-role-header,
.switch-block-inside-role-header {
  padding: 3px 10px;
  margin: -6px -12px 4px -16px;
  border-radius: 0 4px 0 0;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--control-text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.switch-block-outside-role-header::before,
.switch-block-inside-role-header::before {
  content: '⎇';
  font-size: 12px;
  color: var(--control-border);
}

.switch-case,
.switch-default {
  margin: 3px 0;
  padding: 4px 10px;
  overflow: hidden;
}

.switch-case-header,
.switch-default-header {
  padding: 2px 8px;
  margin: -4px -10px 3px -10px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--control-text);
  white-space: nowrap;
}


/* ======================================================
   BLOCK CHILDREN
   ====================================================== */

.block-children {
  padding: 2px 0 2px 12px;
  margin: 2px 0;
}

.conditional-child,
.role-condition-child,
.switch-child,
.role-switch-child,
.loop-child,
.role-loop-child {
  margin: 2px 0;
  padding: 1px 0;
}

/* ======================================================
   LABEL BLOCKS
   ====================================================== */

.label-block {
  margin: 16px 0;
  position: relative;
}

.label-start,
.label-end {
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  padding: 2px 0;
}

.label-block-body {
  border-left: 2px solid var(--border-light);
  margin-left: 6px;
  padding-left: 12px;
}

/* ======================================================
   COLLAPSIBLE BEHAVIOR
   ====================================================== */

.collapsible-header {
  cursor: pointer;
  user-select: none;
}

.collapsible-header:hover {
  opacity: 0.8;
}

.collapsed .block-children,
.collapsed .label-block-body,
.collapsed > .role-body-block {
  display: none;
}

.collapsed .collapsible-header::after {
  content: ' ▸';
  font-size: 10px;
  opacity: 0.6;
}

/* ======================================================
   UPLOAD ZONE
   ====================================================== */

#drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px dashed var(--border-medium);
  border-radius: 8px;
  padding: 40px;
  margin: 40px auto;
  max-width: 400px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-weight: 500;
  transition: all 0.2s ease;
  cursor: pointer;
}

#drop-zone:hover,
#drop-zone.hover {
  background: var(--bg-tertiary);
  border-color: var(--system-border);
  color: var(--text-primary);
}

.upload-button {
  display: inline-block;
  padding: 10px 20px;
  background: var(--system-border);
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 12px;
  font-weight: 600;
  font-size: 13px;
  border: none;
  transition: all 0.2s ease;
}

.upload-button:hover {
  background: var(--system-text);
}

/* ======================================================
   APP LAYOUT
   ====================================================== */

#app {
  display: flex;
  min-height: 100vh;
  background: var(--bg-primary);
}

#sidebar {
  width: 400px;
  background: var(--bg-secondary);
  padding: 24px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-light);
}

#acdl-editor {
  width: 100%;
  flex-grow: 1;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;
  padding: 12px;
  margin: 12px 0;
  border: 1px solid var(--border-medium);
  border-radius: 6px;
  resize: none;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
}

#acdl-editor:focus {
  outline: none;
  border-color: var(--system-border);
  box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.15);
}

#render-btn {
  width: 100%;
  padding: 12px;
  background: var(--system-border);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.2s ease;
}

#render-btn:hover {
  background: var(--system-text);
}

/* ======================================================
   SCROLLBAR STYLING
   ====================================================== */

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--border-dark);
}

/* ======================================================
   ERROR MESSAGES
   ====================================================== */

.error-msg {
  color: #cf222e;
  background: #ffebe9;
  padding: 12px 16px;
  border: 1px solid #ff8182;
  border-radius: 6px;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: 12px;

/* ======================================================
   COMPACT MODE - FOR RESEARCH PAPERS
   ====================================================== */

.compact .prompt-container {
  display: inline-block;
  max-width: 600px;
  padding-left: 10px;
  border-left-width: 1px;
}

.compact .prompt-title {
  padding: 3px 8px;
  margin-bottom: 4px;
  margin-left: -10px;
  padding-left: 10px;
  border-radius: 3px;
}

.compact .prompt-title h1 {
  font-size: 10px;
}

/* Compact role messages */
.compact .role-message,
.compact .none-message {
  margin: 4px 0;
  padding: 0;
  border-radius: 0;
  border-left-width: 1px;
}

.compact .role-message-header,
.compact .none-message-header {
  padding: 0 4px;
  margin: 0;
  font-size: 7px;
  letter-spacing: 0.2px;
  border-radius: 0 0 2px 0;
  line-height: 1;
  display: block;
  width: fit-content;
}

.compact .role-body-block {
  padding: 2px 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 1px 3px;
  align-items: center;
}

/* Compact inline elements */
.compact .template-block {
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 9px;
  gap: 2px;
}

.compact .template-block::before {
  font-size: 5px;
}

.compact .func-block {
  font-size: 9px;
}

.compact .context-var,
.compact .expr-context-var {
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 9px;
  gap: 1px;
}

.compact .time-index,
.compact .other-index,
.compact .loop-var {
  font-size: 9px;
}

.compact .loop-iterable,
.compact .condition-expr,
.compact .switch-expr,
.compact .case-match {
  font-size: 9px;
}

.compact .keyword {
  font-size: 9px;
}

/* Compact expression tokens */
.compact .expr-context-var,
.compact .expr-namespace,
.compact .expr-ident,
.compact .expr-number,
.compact .expr-keyword,
.compact .expr-symbol,
.compact .expr-at,
.compact .expr-logic-op,
.compact .expr-arith-op,
.compact .expr-range,
.compact .expr-string {
  font-size: 9px;
}

.compact .comment,
.compact .inline-comment {
  font-size: 7px;
  margin-left: 2px;
}

.compact .comment-block {
  padding: 1px 0;
  margin: 1px 0;
  font-size: 7px;
}

/* Compact name definitions */
.compact .name-def {
  gap: 3px;
  padding: 1px 0;
  margin: 1px 0;
  font-size: 9px;
}

.compact .name-var,
.compact .name-assign {
  font-size: 9px;
}

.compact .name-ref {
  font-size: 9px;
}

/* Compact list comprehensions */
.compact .list-comprehension {
  font-size: 10px;
}

.compact .list-comp-separator,
.compact .list-comp-var,
.compact .list-comp-in {
  font-size: 9px;
  padding: 0 2px;
}

/* Compact control flow blocks */
.compact .loop-block-outside-role,
.compact .loop-block-inside-role,
.compact .conditional-block-outside-role,
.compact .conditional-block-inside-role,
.compact .switch-block-outside-role,
.compact .switch-block-inside-role {
  margin: 2px 0;
  padding: 2px 6px 2px 8px;
  border-left-width: 1px;
  border-radius: 2px;
}

.compact .loop-block-outside-role-header,
.compact .loop-block-inside-role-header,
.compact .switch-block-outside-role-header,
.compact .switch-block-inside-role-header,
.compact .conditional-block-outside-role-header,
.compact .conditional-block-inside-role-header {
  padding: 1px 4px;
  margin: -2px -6px 2px -8px;
  border-radius: 0 2px 0 0;
  font-size: 7px;
  gap: 3px;
}

.compact .loop-block-outside-role-header::before,
.compact .loop-block-inside-role-header::before,
.compact .switch-block-outside-role-header::before,
.compact .switch-block-inside-role-header::before,
.compact .conditional-block-outside-role-header::before,
.compact .conditional-block-inside-role-header::before {
  font-size: 8px;
}

.compact .conditional-section {
  padding: 2px 5px;
  margin: 1px 0;
  border-radius: 2px;
}

/* Style control flow blocks inside role blocks to match outside-role style (compact) */
.compact .conditional-block-inside-role .conditional-section,
.compact .switch-block-inside-role .switch-case,
.compact .switch-block-inside-role .switch-default {
  background: transparent !important;
  border: none !important;
  border-left: 1px solid var(--control-border) !important;
  border-radius: 0 !important;
}

.compact .conditional-section-header {
  padding: 1px 4px;
  margin: -2px -5px 2px -5px;
  border-radius: 2px 2px 0 0;
  font-size: 7px;
  gap: 2px;
}

.compact .conditional-section-header::before {
  font-size: 7px;
}

.compact .switch-case,
.compact .switch-default {
  margin: 1px 0;
  padding: 2px 5px;
}

.compact .switch-case-header,
.compact .switch-default-header {
  padding: 1px 4px;
  margin: -2px -5px 2px -5px;
  border-radius: 2px 2px 0 0;
  font-size: 7px;
}

/* Compact block children */
.compact .block-children {
  padding: 0 0 0 6px;
  margin: 1px 0;
}

.compact .conditional-child,
.compact .role-condition-child,
.compact .switch-child,
.compact .role-switch-child,
.compact .loop-child,
.compact .role-loop-child {
  margin: 1px 0;
  padding: 0;
}

/* Compact label blocks */
.compact .label-block {
  margin: 4px 0;
}

.compact .label-start,
.compact .label-end {
  font-size: 7px;
  padding: 0;
}

.compact .label-block-body {
  margin-left: 3px;
  padding-left: 6px;
  border-left-width: 1px;
}

/* Compact line height */
.compact,
.compact * {
  line-height: 1.1 !important;
}

/* Remove margins on inline elements in compact mode */
.compact .template-block,
.compact .func-block,
.compact .context-var,
.compact .time-index,
.compact .other-index,
.compact .text-block {
  margin: 0;
  display: inline-flex;
  vertical-align: middle;
}

.compact .role-body-block > * {
  margin: 0;
}

/* Compact nested spacing */
.compact .loop-block-outside-role .role-message,
.compact .loop-block-inside-role .role-message,
.compact .conditional-block-outside-role .role-message,
.compact .conditional-block-inside-role .role-message,
.compact .switch-block-outside-role .role-message,
.compact .switch-block-inside-role .role-message,
.compact .conditional-section .role-message,
.compact .switch-case .role-message,
.compact .switch-default .role-message,
.compact .none-message {
  margin: 4px 0;
}

    switch (arg.kind) {

        return renderContextVarBlock(arg);
      case "function":
        return renderFuncBlock(arg);

        return `<span class="time-index">@${escapeHtml(arg.name)}</span>`;
      case "other-index":
        return `<span class="other-index">${escapeHtml(arg.name)}</span>`;

    const header = `<span class="keyword">ForEach</span> ${indexHtml}: ${iterableHtml}`;
    const bodyHtml = block.body.map(

    const casesHtml = block.cases.map((c) => {
      const bodyHtml = c.body.map(
        (child) => `<div class="switch-child">${renderTopLevelBlock(child)}</div>`
      ).join("\n");
      return wrapBlock(
        "switch-case",

      "switch-block-outside-role",

  }
  function renderSwitchInsideRole(block) {
    const exprHtml = `<span class="switch-expr">${renderExpressionTokens(block.expression)}</span>`;

        "switch-case",

    const renderBody = (body) => body.map(
      (child) => `<div class="role-condition-child">${renderRoleBuildingBlock(child)}</div>`

      wrapBlock(
        "conditional-section",
        `<span class="keyword">If</span> (<span class="condition-expr">${renderExpressionTokens(block.Ifcondition)}</span>):`,
        renderBody(block.IfBody)

        wrapBlock(
          "conditional-section",
          `<span class="keyword">ElseIf</span> (<span class="condition-expr">${renderExpressionTokens(block.elseif[i])}</span>):`,

<div class="conditional-block-inside-role">
  ${parts.join("\n")}
</div>`;
  }
  function renderConditionalOutsideRole(block) {
    const renderBody = (body) => body.map(
      (child) => `<div class="conditional-child">${renderTopLevelBlock(child)}</div>`
    ).join("\n");
    const ifHeader = `<span class="keyword">If</span> (<span class="condition-expr">${renderExpressionTokens(block.Ifcondition)}</span>):`;
    let result = wrapBlock("conditional-block-outside-role", ifHeader, renderBody(block.IfBody));

  <!-- UI Logic -->
  <script>
// Extract Parser and renderPrompt from the bundle
const { Parser, renderPrompt } = ACDL;

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function enableCollapsibleBlocks() {
  const headers = document.querySelectorAll(
    ".role-message-header, " +
    ".loop-block-outside-role-header, .loop-block-inside-role-header, " +
    ".switch-block-outside-role-header, .switch-block-inside-role-header, " +
    ".conditional-section-header"
  );
  headers.forEach((header) => {
    const container = header.parentElement;
    if (!container) return;
    header.classList.add("collapsible-header");
    const newHeader = header.cloneNode(true);
    header.parentNode.replaceChild(newHeader, header);
    newHeader.addEventListener("click", () => { container.classList.toggle("collapsed"); });
  });
}

function doRender() {
  const input = document.getElementById("acdl-editor").value;
  const output = document.getElementById("output");
  if (!input.trim()) {
    output.innerHTML = '<div class="info-msg">Enter ACDL code and click "Render Visualization"</div>';
    return;
  }
  try {
    const parser = new Parser(input);
    const ast = parser.parsePrompt();
    const html = renderPrompt(ast);
    output.innerHTML = html;
    enableCollapsibleBlocks();
  } catch (err) {
    output.innerHTML = '<div class="error-msg">' + escapeHtml(err.message) + '</div>';
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const sidebar = document.getElementById("sidebar");
  const resizer = document.getElementById("resizer");
  const outputWrapper = document.getElementById("output-wrapper");
  const collapseSidebar = document.getElementById("collapse-sidebar");
  const collapseOutput = document.getElementById("collapse-output");
  const restoreSidebar = document.getElementById("restore-sidebar");
  const restoreOutput = document.getElementById("restore-output");
  const promptSelect = document.getElementById("prompt-select");
  const editor = document.getElementById("acdl-editor");
  const renderBtn = document.getElementById("render-btn");
  const output = document.getElementById("output");
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("acdl-upload");

  let isResizing = false;
  let lastSidebarWidth = 420;

  // File upload handling
  function handleFile(file) {
    if (!file.name.endsWith(".acdl")) {
      alert("Please select a .acdl file");
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      editor.value = e.target.result;
      promptSelect.value = "";
      doRender();
    };
    reader.onerror = () => { alert("Error reading file"); };
    reader.readAsText(file);
  }

  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
    fileInput.value = "";
  });

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("hover");
  });

  dropZone.addEventListener("dragleave", (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("hover");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("hover");
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  promptSelect.addEventListener("change", () => {
    const key = promptSelect.value;
    if (key && PROMPTS[key]) {
      editor.value = PROMPTS[key];
      doRender();
    }
  });

  renderBtn.addEventListener("click", doRender);

  // Resizer
  resizer.addEventListener("mousedown", (e) => {
    isResizing = true;
    document.body.classList.add("resizing");
    resizer.classList.add("dragging");
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const containerRect = document.querySelector(".main-container").getBoundingClientRect();
    const newSidebarWidth = e.clientX - containerRect.left;
    const minWidth = 200;
    const maxWidth = containerRect.width - 250;
    if (newSidebarWidth >= minWidth && newSidebarWidth <= maxWidth) {
      sidebar.style.width = newSidebarWidth + "px";
      lastSidebarWidth = newSidebarWidth;
    }
  });

  document.addEventListener("mouseup", () => {
    if (isResizing) {
      isResizing = false;
      document.body.classList.remove("resizing");
      resizer.classList.remove("dragging");
    }
  });

  // Collapse/expand
  collapseSidebar.addEventListener("click", () => {
    sidebar.classList.add("collapsed");
    restoreSidebar.style.display = "block";
  });

  restoreSidebar.addEventListener("click", () => {
    sidebar.classList.remove("collapsed");
    sidebar.style.width = lastSidebarWidth + "px";
    restoreSidebar.style.display = "none";
  });

  collapseOutput.addEventListener("click", () => {
    outputWrapper.classList.add("collapsed");
    restoreOutput.style.display = "block";
  });

  restoreOutput.addEventListener("click", () => {
    outputWrapper.classList.remove("collapsed");
    restoreOutput.style.display = "none";
  });

  // Export functionality
  const exportBtn = document.getElementById("export-btn");
  const exportMenu = document.getElementById("export-menu");
  const exportPng = document.getElementById("export-png");
  const exportPdf = document.getElementById("export-pdf");

  exportBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    exportMenu.classList.toggle("show");
  });

  document.addEventListener("click", () => { exportMenu.classList.remove("show"); });

  async function captureFullContent() {
    const content = output.querySelector(".prompt-container");
    if (!content) return null;
    const originalOutputStyle = output.style.cssText;
    const originalContentStyle = content.style.cssText;
    const originalWrapperStyle = outputWrapper.style.cssText;
    const originalBodyStyle = document.body.style.cssText;

    output.style.overflow = "visible";
    output.style.height = "auto";
    output.style.maxHeight = "none";
    output.style.position = "relative";
    outputWrapper.style.overflow = "visible";
    outputWrapper.style.height = "auto";
    document.body.style.overflow = "visible";

    const inlineFlexEls = content.querySelectorAll(".context-var, .template-block, .func-block, .expr-context-var");
    const savedDisplays = [];
    inlineFlexEls.forEach(el => { savedDisplays.push(el.style.display); el.style.display = "inline-block"; });

    const timeIndexEls = content.querySelectorAll(".time-index, .other-index");
    const savedTimeIndexStyles = [];
    timeIndexEls.forEach(el => {
      savedTimeIndexStyles.push(el.style.cssText);
      el.style.display = "inline";
      el.style.color = "#0969da";
      el.style.fontWeight = "700";
      el.style.fontFamily = "'JetBrains Mono', 'SF Mono', monospace";
    });

    const exportFixStyle = document.createElement("style");
    exportFixStyle.textContent = '.template-block::before { vertical-align: middle; line-height: 1; position: relative; top: -1px; }';
    document.head.appendChild(exportFixStyle);

    content.offsetHeight;

    const fullWidth = Math.max(content.scrollWidth, content.offsetWidth, content.getBoundingClientRect().width);
    const fullHeight = Math.max(content.scrollHeight, content.offsetHeight, content.getBoundingClientRect().height);
    const captureWidth = Math.ceil(fullWidth) + 40;
    const captureHeight = Math.ceil(fullHeight) + 60;

    try {
      const canvas = await html2canvas(content, {
        backgroundColor: "#ffffff",
        scale: window.devicePixelRatio * 2 || 3,
        useCORS: true,
        logging: false,
        width: captureWidth,
        height: captureHeight,
        windowWidth: captureWidth,
        windowHeight: captureHeight,
        scrollX: 0,
        scrollY: 0,
        x: 0,
        y: 0,
        allowTaint: true,
        imageTimeout: 0
      });
      return canvas;
    } finally {
      inlineFlexEls.forEach((el, i) => { el.style.display = savedDisplays[i]; });
      timeIndexEls.forEach((el, i) => { el.style.cssText = savedTimeIndexStyles[i]; });
      exportFixStyle.remove();
      output.style.cssText = originalOutputStyle;
      content.style.cssText = originalContentStyle;
      outputWrapper.style.cssText = originalWrapperStyle;
      document.body.style.cssText = originalBodyStyle;
    }
  }

  exportPng.addEventListener("click", async () => {
    exportMenu.classList.remove("show");
    if (!output.querySelector(".prompt-container")) {
      alert("No visualization to export. Please render a prompt first.");
      return;
    }
    exportBtn.classList.add("loading");
    try {
      const canvas = await captureFullContent();
      if (!canvas) throw new Error("Failed to capture content");
      const link = document.createElement("a");
      link.download = "acdl-visualization.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    } catch (error) {
      console.error("Export failed:", error);
      alert("Failed to export PNG. Please try again.");
    } finally {
      exportBtn.classList.remove("loading");
    }
  });

  exportPdf.addEventListener("click", async () => {
    exportMenu.classList.remove("show");
    if (!output.querySelector(".prompt-container")) {
      alert("No visualization to export. Please render a prompt first.");
      return;
    }
    exportBtn.classList.add("loading");
    try {
      const canvas = await captureFullContent();
      if (!canvas) throw new Error("Failed to capture content");
      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL("image/png");
      const imgWidth = canvas.width;
      const imgHeight = canvas.height;
      const pdfWidth = Math.max(210, (imgWidth / 2) * 0.264583);
      const pdfHeight = (imgHeight / imgWidth) * pdfWidth;
      const pdf = new jsPDF({
        orientation: pdfWidth > pdfHeight ? "landscape" : "portrait",
        unit: "mm",
        format: [pdfWidth, pdfHeight]
      });
      pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
      pdf.save("acdl-visualization.pdf");
    } catch (error) {
      console.error("Export failed:", error);
      alert("Failed to export PDF. Please try again.");
    } finally {
      exportBtn.classList.remove("loading");
    }
  });
});
  </script>
</body>
