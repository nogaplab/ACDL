<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Prompt Renderer</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* 1. Base Layout Structure */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 2. Slim Top Bar - Minimized Wasted Space */
    header {
      height: 55px; /* Extremely slim to prioritize work area */
      background: #ffffff;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      align-items: center;
      padding: 0 15px;
      box-sizing: border-box;
    }

    #drop-zone {
      flex: 1; 
      border: 2px dashed #4A90E2;
      border-radius: 6px;
      padding: 6px; /* Tight padding */
      text-align: center;
      background: #f0f7ff;
      color: #4A90E2;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    #drop-zone.hover { background: #d0e7ff; border-color: #007AFF; }
    
    /* 3. Main Content Area */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #sidebar {
      width: 400px;
      min-width: 350px;
      background: #f8f9fa;
      border-right: 1px solid #dee2e6;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 2px; 
      box-sizing: border-box;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      background: #ffffff;
    }

    /* 4. Live Editor Area */
    #sidebar h3 {
      margin: 0 ; 
      text-align: left;
      padding-left: 30%;
      font-size: 20px;
      color: hsl(136, 84%, 45%);
      text-transform: camelcase;
      letter-spacing: 0.5px;
    }

    #pddl-editor {
      flex: 1; 
      width: 100%;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      resize: none;
      box-sizing: border-box;
      outline: none;
      background: #fff;
    }

    /* 5. Bottom Action Button */
    #render-btn {
      width: 100%;
      padding: 12px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
    #render-btn:hover { background-color: #218838; }

    .browse-btn {
      font-size: 11px;
      text-decoration: underline;
      margin-left: 8px;
      font-weight: normal;
    }

    /* 6. Collapsible Support CSS */
    .collapsed > .block-children,
    .collapsed > .role-body-block,
    .collapsed > .loop-child,
    .collapsed > .role-loop-child,
    .collapsed > .switch-child,
    .collapsed > .role-switch-child,
    .collapsed > .role-condition-child {
      display: none !important;
    }
  </style>
</head>

<body>
  <header>
    <label id="drop-zone" for="pddl-upload">
      Drop .pddl file here <span class="browse-btn">or click to browse</span>
      <input type="file" id="pddl-upload" accept=".pddl" style="display: none;" />
    </label>
  </header>

  <div class="main-container">
    <aside id="sidebar">
      <h3>Live Editor</h3>
      <textarea id="pddl-editor" spellcheck="false" placeholder="Write or paste PDDL code..."></textarea>
      <button id="render-btn">Render Visualization</button>
    </aside>

    <main id="output"></main>
  </div>

  <script type="module">
    import { initFileHandlers } from "/src/main-ui.ts";
    document.addEventListener("DOMContentLoaded", () => {
      initFileHandlers();
    });
  </script>
</body>
</html>
