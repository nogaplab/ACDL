<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PDDL Prompt Visualizer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Layout overrides for the app shell */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
    }

    /* Top header bar */
    header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    #drop-zone {
      flex: 1;
      max-width: 400px;
      height: 40px;
      border: 1px dashed var(--border-medium);
      border-radius: 8px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #drop-zone:hover,
    #drop-zone.hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--system-border);
      color: var(--text-primary);
    }

    .browse-btn {
      font-size: 12px;
      color: var(--system-border);
      margin-left: 6px;
      font-weight: 400;
    }

    /* Main content area */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar editor panel */
    #sidebar {
      width: 420px;
      min-width: 350px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
      box-sizing: border-box;
    }

    #sidebar h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #pddl-editor {
      flex: 1;
      width: 100%;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      resize: none;
      box-sizing: border-box;
      outline: none;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #pddl-editor:focus {
      border-color: var(--system-border);
      box-shadow: 0 0 0 3px var(--system-glow);
    }

    #pddl-editor::placeholder {
      color: var(--text-muted);
    }

    #render-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.25);
    }

    #render-btn:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.35);
    }

    /* Output visualization panel */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg-primary);
    }

    /* Info message styling */
    .info-msg {
      color: var(--text-secondary);
      text-align: center;
      padding: 60px 40px;
      font-size: 15px;
    }

    /* Collapsible support */
    .collapsed > .block-children,
    .collapsed > .role-body-block,
    .collapsed > .loop-child,
    .collapsed > .role-loop-child,
    .collapsed > .switch-child,
    .collapsed > .role-switch-child,
    .collapsed > .role-condition-child {
      display: none !important;
    }
  </style>
</head>

<body>
  <header>
    <h1>PDDL Visualizer</h1>
    <label id="drop-zone" for="pddl-upload">
      Drop .pddl file here <span class="browse-btn">or browse</span>
      <input type="file" id="pddl-upload" accept=".pddl" style="display: none;" />
    </label>
  </header>

  <div class="main-container">
    <aside id="sidebar">
      <h3>Source Editor</h3>
      <textarea id="pddl-editor" spellcheck="false" placeholder="Write or paste PDDL code here..."></textarea>
      <button id="render-btn">Render Flowchart</button>
    </aside>

    <main id="output"></main>
  </div>

  <script type="module">
    import { initFileHandlers } from "/src/main-ui.ts";
    document.addEventListener("DOMContentLoaded", () => {
      initFileHandlers();
    });
  </script>
</body>
</html>
