<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PDDL Prompt Visualizer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css" />

  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Layout overrides for the app shell */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
    }

    /* Top header bar */
    header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    #drop-zone {
      flex: 1;
      max-width: 400px;
      height: 40px;
      border: 1px dashed var(--border-medium);
      border-radius: 8px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #drop-zone:hover,
    #drop-zone.hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--system-border);
      color: var(--text-primary);
    }

    .browse-btn {
      font-size: 12px;
      color: var(--system-border);
      margin-left: 6px;
      font-weight: 400;
    }

    /* Main content area */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar editor panel */
    #sidebar {
      width: 420px;
      min-width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
      box-sizing: border-box;
      transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease;
    }

    #sidebar.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-header h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-toggle-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .panel-toggle-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-medium);
    }

    #pddl-editor {
      flex: 1;
      width: 100%;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      resize: none;
      box-sizing: border-box;
      outline: none;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #pddl-editor:focus {
      border-color: var(--system-border);
      box-shadow: 0 0 0 3px var(--system-glow);
    }

    #pddl-editor::placeholder {
      color: var(--text-muted);
    }

    #render-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.25);
    }

    #render-btn:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.35);
    }

    /* Resizer between panels */
    .resizer {
      width: 6px;
      background: var(--border-subtle);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s ease;
      position: relative;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--system-border);
    }

    .resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 30px;
      background: var(--text-muted);
      border-radius: 1px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .resizer:hover::after,
    .resizer.dragging::after {
      opacity: 1;
    }

    /* Output visualization panel */
    #output-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
      transition: min-width 0.3s ease;
    }

    #output-wrapper.collapsed {
      min-width: 0 !important;
      flex: 0 !important;
      width: 0 !important;
      overflow: hidden;
    }

    #output-wrapper.collapsed #output-header,
    #output-wrapper.collapsed #output {
      display: none;
    }

    #output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
    }

    #output-header h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg-primary);
    }

    /* Collapsed panel restore buttons */
    .restore-btn {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      display: none;
      z-index: 100;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .restore-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--system-border);
    }

    #restore-sidebar {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      border-left: none;
      border-radius: 0 4px 4px 0;
    }

    #restore-output {
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      border-right: none;
      border-radius: 4px 0 0 4px;
    }

    #sidebar.collapsed ~ .resizer ~ #output-wrapper #restore-sidebar,
    .main-container:has(#sidebar.collapsed) #restore-sidebar {
      display: block;
    }

    body:has(#sidebar.collapsed) #restore-sidebar {
      display: block;
    }

    body:has(#output-wrapper.collapsed) #restore-output {
      display: block;
    }

    /* Info message styling */
    .info-msg {
      color: var(--text-secondary);
      text-align: center;
      padding: 60px 40px;
      font-size: 15px;
    }

    /* Collapsible support */
    .collapsed > .block-children,
    .collapsed > .role-body-block,
    .collapsed > .loop-child,
    .collapsed > .role-loop-child,
    .collapsed > .switch-child,
    .collapsed > .role-switch-child,
    .collapsed > .role-condition-child {
      display: none !important;
    }

    /* Prevent text selection while dragging */
    body.resizing {
      user-select: none;
      cursor: col-resize;
    }

    /* Export button and dropdown */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .export-dropdown {
      position: relative;
    }

    .export-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .export-btn:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
    }

    .export-btn:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .export-btn svg {
      width: 14px;
      height: 14px;
    }

    .export-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 4px;
      min-width: 140px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      display: none;
    }

    .export-menu.show {
      display: block;
    }

    .export-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .export-menu-item:hover {
      background: var(--bg-tertiary);
    }

    .export-menu-item svg {
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
    }

    /* Export loading state */
    .export-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .export-btn.loading::after {
      content: '';
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 4px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Editor bracket highlighting */
    .editor-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .editor-wrapper #pddl-editor {
      flex: 1;
      margin: 0;
    }

    .bracket-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bracket-highlight {
      position: absolute;
      border-radius: 2px;
    }

    .bracket-highlight.matched {
      background: rgba(9, 105, 218, 0.25);
      border: 1px solid rgba(9, 105, 218, 0.5);
    }

    .bracket-highlight.unmatched {
      background: rgba(207, 34, 46, 0.25);
      border: 1px solid rgba(207, 34, 46, 0.6);
    }

    /* Compact mode toggle */
    .compact-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .compact-toggle:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-medium);
      color: var(--text-primary);
    }

    .compact-toggle.active {
      background: rgba(96, 165, 250, 0.15);
      border-color: var(--control-border);
      color: var(--control-text);
    }

    .compact-toggle svg {
      width: 14px;
      height: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h1>PDDL Visualizer</h1>
    <label id="drop-zone" for="pddl-upload">
      Drop .pddl file here <span class="browse-btn">or browse</span>
      <input type="file" id="pddl-upload" accept=".pddl" style="display: none;" />
    </label>
  </header>

  <div class="main-container">
    <aside id="sidebar">
      <div class="panel-header">
        <h3>Source Editor</h3>
        <button class="panel-toggle-btn" id="collapse-sidebar" title="Collapse editor">
          <span>&#x25C0;</span>
        </button>
      </div>
      <textarea id="pddl-editor" spellcheck="false" placeholder="Write or paste PDDL code here..."></textarea>
      <button id="render-btn">Render Flowchart</button>
    </aside>

    <div class="resizer" id="resizer"></div>

    <div id="output-wrapper">
      <div id="output-header">
        <h3>Visualization</h3>
        <div class="header-actions">
          <button class="compact-toggle" id="compact-toggle" title="Toggle compact mode for papers">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 14 10 14 10 20"/>
              <polyline points="20 10 14 10 14 4"/>
              <line x1="14" y1="10" x2="21" y2="3"/>
              <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
            Compact
          </button>
          <div class="export-dropdown">
            <button class="export-btn" id="export-btn" title="Export visualization">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Export
            </button>
            <div class="export-menu" id="export-menu">
              <button class="export-menu-item" id="export-png">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                Export as PNG
              </button>
              <button class="export-menu-item" id="export-pdf">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Export as PDF
              </button>
            </div>
          </div>
          <button class="panel-toggle-btn" id="collapse-output" title="Collapse visualization">
            <span>&#x25B6;</span>
          </button>
        </div>
      </div>
      <main id="output"></main>
    </div>
  </div>

  <!-- Restore buttons for collapsed panels -->
  <button class="restore-btn" id="restore-sidebar" title="Show editor">Editor</button>
  <button class="restore-btn" id="restore-output" title="Show visualization">Viz</button>

  <script type="module">
    import { initFileHandlers } from "/src/main-ui.ts";
    document.addEventListener("DOMContentLoaded", () => {
      initFileHandlers();
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sidebar = document.getElementById("sidebar");
      const resizer = document.getElementById("resizer");
      const outputWrapper = document.getElementById("output-wrapper");
      const collapseSidebar = document.getElementById("collapse-sidebar");
      const collapseOutput = document.getElementById("collapse-output");
      const restoreSidebar = document.getElementById("restore-sidebar");
      const restoreOutput = document.getElementById("restore-output");

      let isResizing = false;
      let lastSidebarWidth = 420;
      let lastOutputFlex = 1;

      // Resizer drag functionality
      resizer.addEventListener("mousedown", (e) => {
        isResizing = true;
        document.body.classList.add("resizing");
        resizer.classList.add("dragging");
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;

        const containerRect = document.querySelector(".main-container").getBoundingClientRect();
        const newSidebarWidth = e.clientX - containerRect.left;
        const minWidth = 200;
        const maxWidth = containerRect.width - 250; // Leave space for output

        if (newSidebarWidth >= minWidth && newSidebarWidth <= maxWidth) {
          sidebar.style.width = newSidebarWidth + "px";
          lastSidebarWidth = newSidebarWidth;
        }
      });

      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          document.body.classList.remove("resizing");
          resizer.classList.remove("dragging");
        }
      });

      // Collapse/expand sidebar
      collapseSidebar.addEventListener("click", () => {
        sidebar.classList.add("collapsed");
        restoreSidebar.style.display = "block";
      });

      restoreSidebar.addEventListener("click", () => {
        sidebar.classList.remove("collapsed");
        sidebar.style.width = lastSidebarWidth + "px";
        restoreSidebar.style.display = "none";
      });

      // Collapse/expand output
      collapseOutput.addEventListener("click", () => {
        outputWrapper.classList.add("collapsed");
        restoreOutput.style.display = "block";
      });

      restoreOutput.addEventListener("click", () => {
        outputWrapper.classList.remove("collapsed");
        restoreOutput.style.display = "none";
      });

      // Editor enhancements
      const pddlEditor = document.getElementById("pddl-editor");
      const bracketPairs = { '(': ')', '{': '}', '[': ']' };
      const closingBrackets = { ')': '(', '}': '{', ']': '[' };

      // Tab key handling
      pddlEditor.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const start = pddlEditor.selectionStart;
          const end = pddlEditor.selectionEnd;
          const spaces = "    ";
          pddlEditor.value = pddlEditor.value.substring(0, start) + spaces + pddlEditor.value.substring(end);
          pddlEditor.selectionStart = pddlEditor.selectionEnd = start + spaces.length;
          updateBracketHighlights();
        }

        // Auto-close brackets
        if (bracketPairs[e.key]) {
          e.preventDefault();
          const start = pddlEditor.selectionStart;
          const end = pddlEditor.selectionEnd;
          const closing = bracketPairs[e.key];
          pddlEditor.value = pddlEditor.value.substring(0, start) + e.key + pddlEditor.value.substring(start, end) + closing + pddlEditor.value.substring(end);
          pddlEditor.selectionStart = pddlEditor.selectionEnd = start + 1;
          updateBracketHighlights();
        }

        // Skip over closing bracket if typed when already there
        if (closingBrackets[e.key]) {
          const pos = pddlEditor.selectionStart;
          if (pddlEditor.value[pos] === e.key) {
            e.preventDefault();
            pddlEditor.selectionStart = pddlEditor.selectionEnd = pos + 1;
          }
        }
      });

      // Create bracket highlight overlay
      const editorWrapper = document.createElement("div");
      editorWrapper.className = "editor-wrapper";
      pddlEditor.parentNode.insertBefore(editorWrapper, pddlEditor);
      editorWrapper.appendChild(pddlEditor);

      const highlightOverlay = document.createElement("div");
      highlightOverlay.className = "bracket-overlay";
      editorWrapper.appendChild(highlightOverlay);

      // Find all brackets and their pairs
      function findBracketPairs(text) {
        const brackets = [];
        const stack = { '(': [], '{': [], '[': [] };
        const pairs = [];
        const unmatched = [];

        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          if (bracketPairs[char]) {
            stack[char].push(i);
            brackets.push({ pos: i, char, type: 'open' });
          } else if (closingBrackets[char]) {
            const opener = closingBrackets[char];
            if (stack[opener].length > 0) {
              const openPos = stack[opener].pop();
              pairs.push({ open: openPos, close: i });
            } else {
              unmatched.push(i);
            }
          }
        }

        // Remaining unclosed brackets
        Object.values(stack).forEach(arr => {
          arr.forEach(pos => unmatched.push(pos));
        });

        return { pairs, unmatched };
      }

      // Get character position in textarea
      function getCharPosition(textarea, index) {
        const text = textarea.value.substring(0, index);
        const lines = text.split('\n');
        const lineNumber = lines.length - 1;
        const charInLine = lines[lines.length - 1].length;

        const style = getComputedStyle(textarea);
        const lineHeight = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.5;
        const paddingTop = parseFloat(style.paddingTop);
        const paddingLeft = parseFloat(style.paddingLeft);
        const fontSize = parseFloat(style.fontSize);

        // Create measurement element
        const measure = document.createElement('span');
        measure.style.font = style.font;
        measure.style.visibility = 'hidden';
        measure.style.position = 'absolute';
        measure.style.whiteSpace = 'pre';
        measure.textContent = lines[lines.length - 1].substring(0, charInLine);
        document.body.appendChild(measure);
        const charWidth = measure.offsetWidth;
        document.body.removeChild(measure);

        return {
          top: paddingTop + lineNumber * lineHeight - textarea.scrollTop,
          left: paddingLeft + charWidth - textarea.scrollLeft,
          width: fontSize * 0.6,
          height: lineHeight
        };
      }

      function updateBracketHighlights() {
        const text = pddlEditor.value;
        const cursorPos = pddlEditor.selectionStart;
        const { pairs, unmatched } = findBracketPairs(text);

        highlightOverlay.innerHTML = '';

        // Highlight unmatched brackets in red
        unmatched.forEach(pos => {
          const position = getCharPosition(pddlEditor, pos);
          if (position.top >= 0 && position.top < pddlEditor.clientHeight) {
            const highlight = document.createElement('div');
            highlight.className = 'bracket-highlight unmatched';
            highlight.style.top = position.top + 'px';
            highlight.style.left = position.left + 'px';
            highlight.style.width = position.width + 'px';
            highlight.style.height = position.height + 'px';
            highlightOverlay.appendChild(highlight);
          }
        });

        // Find if cursor is on a bracket
        const charAtCursor = text[cursorPos];
        const charBeforeCursor = text[cursorPos - 1];

        let bracketPos = -1;
        if (bracketPairs[charAtCursor] || closingBrackets[charAtCursor]) {
          bracketPos = cursorPos;
        } else if (bracketPairs[charBeforeCursor] || closingBrackets[charBeforeCursor]) {
          bracketPos = cursorPos - 1;
        }

        if (bracketPos >= 0) {
          // Find matching pair
          const pair = pairs.find(p => p.open === bracketPos || p.close === bracketPos);
          if (pair) {
            [pair.open, pair.close].forEach(pos => {
              const position = getCharPosition(pddlEditor, pos);
              if (position.top >= 0 && position.top < pddlEditor.clientHeight) {
                const highlight = document.createElement('div');
                highlight.className = 'bracket-highlight matched';
                highlight.style.top = position.top + 'px';
                highlight.style.left = position.left + 'px';
                highlight.style.width = position.width + 'px';
                highlight.style.height = position.height + 'px';
                highlightOverlay.appendChild(highlight);
              }
            });
          }
        }
      }

      // Update highlights on various events
      pddlEditor.addEventListener('input', updateBracketHighlights);
      pddlEditor.addEventListener('click', updateBracketHighlights);
      pddlEditor.addEventListener('keyup', updateBracketHighlights);
      pddlEditor.addEventListener('scroll', updateBracketHighlights);

      // Initial highlight
      setTimeout(updateBracketHighlights, 100);

      // Compact mode toggle
      const compactToggle = document.getElementById("compact-toggle");
      const output = document.getElementById("output");

      compactToggle.addEventListener("click", () => {
        output.classList.toggle("compact");
        compactToggle.classList.toggle("active");
      });

      // Export functionality
      const exportBtn = document.getElementById("export-btn");
      const exportMenu = document.getElementById("export-menu");
      const exportPng = document.getElementById("export-png");
      const exportPdf = document.getElementById("export-pdf");

      // Toggle export menu
      exportBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        exportMenu.classList.toggle("show");
      });

      // Close menu when clicking outside
      document.addEventListener("click", () => {
        exportMenu.classList.remove("show");
      });

      // Helper function to capture full content
      async function captureFullContent() {
        const content = output.querySelector(".prompt-container");
        if (!content) return null;

        // Store original styles for all affected elements
        const originalOutputStyle = output.style.cssText;
        const originalContentStyle = content.style.cssText;
        const originalWrapperStyle = outputWrapper.style.cssText;
        const originalBodyStyle = document.body.style.cssText;

        // Temporarily remove all constraints to allow full content measurement
        output.style.overflow = "visible";
        output.style.height = "auto";
        output.style.maxHeight = "none";
        output.style.position = "relative";
        outputWrapper.style.overflow = "visible";
        outputWrapper.style.height = "auto";
        document.body.style.overflow = "visible";

        // html2canvas doesn't render text inside inline-flex elements properly
        // in certain nesting contexts (e.g. context-vars inside ForEach loops).
        // Temporarily switch to inline-block for the capture.
        const inlineFlexEls = content.querySelectorAll(".context-var, .template-block, .func-block");
        const savedDisplays = [];
        inlineFlexEls.forEach(el => {
          savedDisplays.push(el.style.display);
          el.style.display = "inline-block";
        });

        // Force layout recalculation
        content.offsetHeight;

        // Get the full scrollable dimensions
        const fullWidth = Math.max(
          content.scrollWidth,
          content.offsetWidth,
          content.getBoundingClientRect().width
        );
        const fullHeight = Math.max(
          content.scrollHeight,
          content.offsetHeight,
          content.getBoundingClientRect().height
        );

        const captureWidth = Math.ceil(fullWidth) + 20;
        const captureHeight = Math.ceil(fullHeight) + 20;

        try {
          const canvas = await html2canvas(content, {
            backgroundColor: "#ffffff",
            scale: window.devicePixelRatio * 2 || 3,
            useCORS: true,
            logging: false,
            width: captureWidth,
            height: captureHeight,
            windowWidth: captureWidth,
            windowHeight: captureHeight,
            scrollX: 0,
            scrollY: 0,
            x: 0,
            y: 0,
            allowTaint: true,
            imageTimeout: 0
          });
          return canvas;
        } finally {
          // Restore inline-flex display on captured elements
          inlineFlexEls.forEach((el, i) => {
            el.style.display = savedDisplays[i];
          });

          // Restore original styles
          output.style.cssText = originalOutputStyle;
          content.style.cssText = originalContentStyle;
          outputWrapper.style.cssText = originalWrapperStyle;
          document.body.style.cssText = originalBodyStyle;
        }
      }

      // Export as PNG
      exportPng.addEventListener("click", async () => {
        exportMenu.classList.remove("show");

        if (!output.querySelector(".prompt-container")) {
          alert("No visualization to export. Please render a flowchart first.");
          return;
        }

        exportBtn.classList.add("loading");

        try {
          const canvas = await captureFullContent();
          if (!canvas) throw new Error("Failed to capture content");

          const link = document.createElement("a");
          link.download = "pddl-visualization.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        } catch (error) {
          console.error("Export failed:", error);
          alert("Failed to export PNG. Please try again.");
        } finally {
          exportBtn.classList.remove("loading");
        }
      });

      // Export as PDF
      exportPdf.addEventListener("click", async () => {
        exportMenu.classList.remove("show");

        if (!output.querySelector(".prompt-container")) {
          alert("No visualization to export. Please render a flowchart first.");
          return;
        }

        exportBtn.classList.add("loading");

        try {
          const canvas = await captureFullContent();
          if (!canvas) throw new Error("Failed to capture content");

          const { jsPDF } = window.jspdf;
          const imgData = canvas.toDataURL("image/png");

          // Calculate dimensions to fit the content
          const imgWidth = canvas.width;
          const imgHeight = canvas.height;

          // Use A4 as base, but adjust if content is wider
          const pdfWidth = Math.max(210, (imgWidth / 2) * 0.264583); // Convert px to mm at scale 2
          const pdfHeight = (imgHeight / imgWidth) * pdfWidth;

          const pdf = new jsPDF({
            orientation: pdfWidth > pdfHeight ? "landscape" : "portrait",
            unit: "mm",
            format: [pdfWidth, pdfHeight]
          });

          pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
          pdf.save("pddl-visualization.pdf");
        } catch (error) {
          console.error("Export failed:", error);
          alert("Failed to export PDF. Please try again.");
        } finally {
          exportBtn.classList.remove("loading");
        }
      });
    });
  </script>
</body>
</html>
