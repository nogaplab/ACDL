<!DOCTYPE html>
<html lang="en">
<head>
  {{GA}}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{BASE}}shared/styles.css">
  <style>
    .motivation-hero {
      padding: 140px 24px 24px;
      text-align: center;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.15), transparent);
    }

    .motivation-hero h1 {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      background: linear-gradient(to bottom right, #fff 30%, rgba(255,255,255,0.4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .motivation-hero p {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.5);
      max-width: 1000px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .motivation-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .motivation-section {
      margin-bottom: 56px;
    }

    .motivation-section h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .motivation-section p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    .motivation-section p strong {
      color: rgba(255,255,255,0.9);
    }

    .motivation-section ul {
      list-style: none;
      padding: 0;
      margin: 24px 0;
    }

    .motivation-section li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      font-size: 1.05rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
    }

    .motivation-section li::before {
      content: '';
      width: 8px;
      height: 8px;
      min-width: 8px;
      background: #7877c6;
      border-radius: 50%;
      margin-top: 9px;
    }

    /* Slide-style ambiguity demonstration */
    .ambiguity-demo {
      margin: 32px 0;
    }

    .desc-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px 28px 32px;
    }

    .desc-lead {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.85);
      margin: 0 0 8px;
    }

    .desc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .desc-list li {
      display: block;
      position: relative;
      padding: 8px 0 8px 22px;
      font-size: 1.08rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.82);
    }

    .desc-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15px;
      width: 7px;
      height: 7px;
      background: #7877c6;
      border-radius: 50%;
    }

    /* Highlighted phrase with arrow underneath */
    .hl-phrase {
      position: relative;
      display: inline-block;
      border: 2px solid #7877c6;
      border-radius: 6px;
      padding: 1px 8px;
      color: #fff;
      white-space: nowrap;
    }

    .hl-arrow {
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      margin-top: 6px;
      color: #7877c6;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .ambiguous-label {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin: 30px 0;
    }

    .options-compare {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
    }

    .option-card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px 28px;
    }

    .option-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .option-card li {
      display: block;
      position: relative;
      padding: 6px 0 6px 18px;
      font-size: 1rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
    }

    .option-card li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 13px;
      width: 6px;
      height: 6px;
      background: #7877c6;
      border-radius: 50%;
    }

    .option-card li ul {
      margin-top: 2px;
      padding-left: 12px;
    }

    .option-card li ul li {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
    }

    .option-card li ul li::before {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.45);
    }

    .option-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7877c6;
      color: #fff;
      border-radius: 50%;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .neq {
      font-size: 2.25rem;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      text-align: center;
    }

    /* Principles in the ACDL section */
    .principles {
      list-style: none;
      padding: 0;
      margin: 24px 0 0;
    }

    .principles li {
      display: block;
      padding: 16px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 1.08rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.7);
    }

    .principles li::before { content: none; }

    .principles li strong {
      color: #fff;
      font-weight: 600;
    }

    /* Comparison figure (breaks out wider than the text column) */
    .comparison-figure {
      width: min(1040px, 92vw);
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      margin: 40px 0;
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .comparison-col {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
    }

    .comparison-col-header {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .comparison-col-header h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin: 0 0 4px;
    }

    .comparison-col-header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin: 0;
      line-height: 1.5;
    }

    figcaption {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      margin-top: 18px;
      line-height: 1.6;
    }

    /* --- Rendered ACDL output (shared look with the tutorial page) --- */
    .rendered-output {
      background: #fff;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.4;
    }

    .rendered-output .prompt-title {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 6px 12px;
      margin-bottom: 10px;
    }

    .rendered-output .prompt-title h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: #0a0a0a;
      font-family: 'JetBrains Mono', monospace;
    }

    .rendered-output .role-msg {
      border-left: 2px solid #d0d7de;
      margin: 5px 0;
      padding: 0;
    }
    .rendered-output .role-msg.system { border-left-color: #0969da; }
    .rendered-output .role-msg.user { border-left-color: #e5990b; }
    .rendered-output .role-msg.assistant { border-left-color: #1acad1; }
    .rendered-output .role-msg.tool { border-left-color: #f7660b; }

    .rendered-output .role-badge {
      display: block;
      width: fit-content;
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      border-radius: 0 0 3px 0;
      color: #fff;
      line-height: 1;
    }
    .rendered-output .role-msg.system .role-badge { background: #0969da; }
    .rendered-output .role-msg.user .role-badge { background: #e5990b; }
    .rendered-output .role-msg.assistant .role-badge { background: #1acad1; }
    .rendered-output .role-msg.tool .role-badge { background: #f7660b; }

    .rendered-output .role-body {
      padding: 6px 10px;
    }

    .rendered-output .tpl {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #faf5ff;
      border: 1px solid #9333ea;
      color: #9333ea;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      margin: 2px 0;
    }
    .rendered-output .tpl::before {
      content: '\25C6';
      font-size: 10px;
      opacity: 0.7;
    }

    .rendered-output .ctx {
      display: inline-flex;
      align-items: center;
      background: #e0ffdd;
      border: 1px solid #0da66b;
      color: #0da66b;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      margin: 2px 0;
    }

    .rendered-output .idx {
      color: #0969da;
      font-weight: 700;
    }

    .rendered-output .ctrl-block {
      border-left: 2px solid #6e7781;
      margin: 6px 0;
      padding: 4px 8px 4px 10px;
    }

    .rendered-output .ctrl-header {
      padding: 4px 8px;
      margin: -4px -8px 6px -10px;
      font-size: 13px;
      font-weight: 600;
      color: #57606a;
      background: #eaeef2;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .rendered-output .ctrl-header::before {
      content: '\21BB';
      font-size: 12px;
      color: #6e7781;
    }

    .rendered-output .cmt {
      color: #6e7781;
      font-style: italic;
      font-size: 12px;
      display: block;
      margin: 4px 0;
    }

    .cta-section {
      text-align: center;
      padding: 32px 0 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 24px;
    }

    .cta-section h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .comparison-grid { grid-template-columns: 1fr; }
      .options-compare { grid-template-columns: 1fr; }
      .neq { transform: rotate(90deg); }
      .motivation-hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  {{NAV}}

  {{CONTENT}}

  {{FOOTER}}
</body>
</html>
