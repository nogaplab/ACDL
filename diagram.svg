<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240">
  <!-- Background -->
  <rect width="420" height="240" fill="white"/>

  <!-- Environment bubble -->
  <ellipse cx="70" cy="130" rx="50" ry="30" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="70" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2">Environment</text>

  <!-- System/Agent bubble -->
  <ellipse cx="210" cy="130" rx="50" ry="30" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="210" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388e3c">System/</text>
  <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388e3c">Agent</text>

  <!-- LLM bubble -->
  <ellipse cx="350" cy="130" rx="50" ry="30" fill="#fce4ec" stroke="#c2185b" stroke-width="2"/>
  <text x="350" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2185b">LLM</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d32f2f"/>
    </marker>
  </defs>

  <!-- Top arrow: Env to Sys (offset right on start, left on end) -->
  <path d="M 95 102 Q 140 60 185 102" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Top arrow: Sys to LLM (offset right on start, left on end) -->
  <path d="M 235 102 Q 280 60 325 102" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Ellipse around Sys to LLM arrow (full coverage) -->
  <ellipse cx="280" cy="82" rx="55" ry="32" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Bottom arrow: LLM to Sys (offset left on start, right on end) -->
  <path d="M 325 158 Q 280 200 235 158" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Bottom arrow: Sys to Env (offset left on start, right on end) -->
  <path d="M 185 158 Q 140 200 95 158" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Annotation arrow pointing down to the circled area -->
  <line x1="280" y1="28" x2="280" y2="48" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>

  <!-- Annotation text -->
  <text x="280" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#d32f2f">our language describes this</text>
</svg>