<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ACDL Live Editor</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />

  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Layout overrides for the app shell */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
    }

    /* Top header bar */
    header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-divider {
      color: var(--text-muted);
      font-weight: 300;
    }

    #drop-zone {
      flex: 1;
      max-width: 400px;
      height: 50px;
      border: 1px dashed var(--border-medium);
      border-radius: 8px;
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 2px;
    }

    #drop-zone:hover,
    #drop-zone.hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--system-border);
    }

    .drop-text {
      font-weight: 600;
    }

    .browse-btn {
      font-size: 12px;
      color: var(--system-border);
      font-weight: 400;
    }

    .prompt-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt-selector label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .prompt-selector select {
      padding: 6px 10px;
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
    }

    /* Main content area */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar editor panel */
    #sidebar {
      width: 420px;
      min-width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
      box-sizing: border-box;
      transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease;
    }

    #sidebar.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-header h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-toggle-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .panel-toggle-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-medium);
    }

    #acdl-editor-container {
      flex: 1;
      width: 100%;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #acdl-editor-container:focus-within {
      border-color: var(--system-border);
      box-shadow: 0 0 0 3px var(--system-glow);
    }

    #acdl-editor-container .cm-editor {
      height: 100%;
    }

    #acdl-editor-container .cm-scroller {
      overflow: auto;
    }

    #render-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.25);
    }

    #render-btn:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.35);
    }

    /* Resizer between panels */
    .resizer {
      width: 6px;
      background: var(--border-subtle);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s ease;
      position: relative;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--system-border);
    }

    .resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 30px;
      background: var(--text-muted);
      border-radius: 1px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .resizer:hover::after,
    .resizer.dragging::after {
      opacity: 1;
    }

    /* Output visualization panel */
    #output-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
      transition: min-width 0.3s ease;
    }

    #output-wrapper.collapsed {
      min-width: 0 !important;
      flex: 0 !important;
      width: 0 !important;
      overflow: hidden;
    }

    #output-wrapper.collapsed #output-header,
    #output-wrapper.collapsed #output {
      display: none;
    }

    #output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
    }

    #output-header h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg-primary);
    }

    /* Collapsed panel restore buttons */
    .restore-btn {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      display: none;
      z-index: 100;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .restore-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--system-border);
    }

    #restore-sidebar {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      border-left: none;
      border-radius: 0 4px 4px 0;
    }

    #restore-output {
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      border-right: none;
      border-radius: 4px 0 0 4px;
    }

    #sidebar.collapsed ~ .resizer ~ #output-wrapper #restore-sidebar,
    .main-container:has(#sidebar.collapsed) #restore-sidebar {
      display: block;
    }

    body:has(#sidebar.collapsed) #restore-sidebar {
      display: block;
    }

    body:has(#output-wrapper.collapsed) #restore-output {
      display: block;
    }

    /* Info message styling */
    .info-msg {
      color: var(--text-secondary);
      text-align: center;
      padding: 60px 40px;
      font-size: 15px;
    }

    /* Collapsible support */
    .collapsed > .block-children,
    .collapsed > .role-body-block,
    .collapsed > .loop-child,
    .collapsed > .role-loop-child,
    .collapsed > .switch-child,
    .collapsed > .role-switch-child,
    .collapsed > .role-condition-child {
      display: none !important;
    }

    /* Prevent text selection while dragging */
    body.resizing {
      user-select: none;
      cursor: col-resize;
    }

    /* Export button and dropdown */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .export-dropdown {
      position: relative;
    }

    .export-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .export-btn:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
    }

    .export-btn:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .export-btn svg {
      width: 14px;
      height: 14px;
    }

    .export-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 4px;
      min-width: 140px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      display: none;
    }

    .export-menu.show {
      display: block;
    }

    .export-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .export-menu-item:hover {
      background: var(--bg-tertiary);
    }

    .export-menu-item svg {
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
    }

    /* Export loading state */
    .export-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .export-btn.loading::after {
      content: '';
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 4px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Width control slider */
    .width-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 12px;
      padding-right: 12px;
      border-right: 1px solid var(--border-subtle);
    }

    .width-control label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .width-control input[type="range"] {
      width: 180px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border-medium);
      border-radius: 2px;
      cursor: pointer;
    }

    .width-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      line-height: 1;
    }

    .width-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--system-border);
    }

    .width-btn:active {
      transform: scale(0.95);
    }

    .width-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--system-border);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .width-control input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .width-control input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--system-border);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    .width-control input[type="number"] {
      width: 55px;
      padding: 4px 6px;
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 12px;
      text-align: center;
      -moz-appearance: textfield;
    }

    .width-control input[type="number"]::-webkit-outer-spin-button,
    .width-control input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .width-control .width-unit {
      font-size: 12px;
      color: var(--text-muted);
    }

  </style>
</head>

<body>
  <header>
    <h1>ACDL<span class="header-divider">|</span>Live Editor</h1>
    <label id="drop-zone" for="acdl-upload">
      <span class="drop-text">Drop .acdl file here</span>
      <span class="browse-btn">or browse</span>
      <input type="file" id="acdl-upload" accept=".acdl" style="display: none;" />
    </label>
    <div class="prompt-selector">
      <label for="prompt-select">Examples:</label>
      <select id="prompt-select">
        <option value="">-- Select --</option>
        <optgroup label="Basic Patterns">
          <option value="basic">Basic Context</option>
          <option value="rag">Basic RAG</option>
        </optgroup>
        <optgroup label="ReAct Patterns">
          <option value="fig1_base">ReAct Base</option>
          <option value="fig1_left">ReAct No Reasoning in History</option>
          <option value="fig1_right">ReAct with Tool-RAG</option>
        </optgroup>
        <optgroup label="Real-World Systems">
          <option value="opencode">OpenCode (Claude Code-like)</option>
          <option value="openclaw">OpenClaw (Letta-like)</option>
          <option value="pokemon">Pokemon Agent</option>
          <option value="multiagent">Multi-Agent Simulation</option>
          <option value="mintagent">MintAgent</option>
        </optgroup>
      </select>
    </div>
  </header>

  <div class="main-container">
    <aside id="sidebar">
      <div class="panel-header">
        <h3>Source Editor</h3>
        <button class="panel-toggle-btn" id="collapse-sidebar" title="Collapse editor">
          <span>&#x25C0;</span>
        </button>
      </div>
      <div id="acdl-editor-container"></div>
      <button id="render-btn">Render Visualization</button>
    </aside>

    <div class="resizer" id="resizer"></div>

    <div id="output-wrapper">
      <div id="output-header">
        <h3>Visualization</h3>
        <div class="header-actions">
          <div class="width-control">
            <label for="width-slider">Width:</label>
            <button class="width-btn" id="width-decrease" title="Decrease width">−</button>
            <input type="range" id="width-slider" min="200" max="1000" value="800" />
            <button class="width-btn" id="width-increase" title="Increase width">+</button>
            <input type="number" id="width-input" min="200" max="1000" value="800" />
            <span class="width-unit">px</span>
          </div>
          <div class="export-dropdown">
            <button class="export-btn" id="export-btn" title="Export visualization">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Export
            </button>
            <div class="export-menu" id="export-menu">
              <button class="export-menu-item" id="export-png">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                Export as PNG
              </button>
              <button class="export-menu-item" id="export-pdf">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Export as PDF
              </button>
            </div>
          </div>
          <button class="panel-toggle-btn" id="collapse-output" title="Collapse visualization">
            <span>&#x25B6;</span>
          </button>
        </div>
      </div>
      <div id="overflow-warning" class="overflow-warning">
        Content does not fit within the chosen width and is therefore cropped. Increase width to fit the content in the visualization.
      </div>
      <main id="output" class="compact">
        <div class="info-msg">
          Select an example prompt from the dropdown or enter ACDL code, then click "Render Visualization"
        </div>
      </main>
    </div>
  </div>

  <!-- Restore buttons for collapsed panels -->
  <button class="restore-btn" id="restore-sidebar" title="Show editor">Editor</button>
  <button class="restore-btn" id="restore-output" title="Show visualization">Viz</button>

  <script type="module">
    import { initFileHandlers, getEditorView, doRender, detectOverflow, Parser, renderPromptsSvg } from "./main-ui.ts";
    // Expose for PDF export in non-module script
    window.ACDLParser = Parser;
    window.ACDLRenderSvg = renderPromptsSvg;
    window.ACDLGetEditorView = getEditorView;

    // Map dropdown values to file paths (absolute paths resolved by Vite alias)
    const PROMPT_PATHS = {
      fig1_base: '/ACDL_examples/React_variants/fig1-base.acdl',
      fig1_left: '/ACDL_examples/React_variants/fig1-left.acdl',
      fig1_right: '/ACDL_examples/React_variants/fig1-right.acdl',
      rag: '/ACDL_examples/other/basic-rag.acdl',
      mintagent: '/ACDL_examples/MintAgent_variants/mint-original.acdl',
      multiagent: '/ACDL_examples/complex_examples/MultiAgent.acdl',
      openclaw: '/ACDL_examples/complex_examples/OpenClaw.acdl',
      opencode: '/ACDL_examples/complex_examples/OpenCode.acdl',
      pokemon: '/ACDL_examples/complex_examples/pokemon.acdl',
    };

    document.addEventListener("DOMContentLoaded", () => {
      try {
        initFileHandlers();

        // Set up examples dropdown
        const promptSelect = document.getElementById("prompt-select");
        promptSelect.addEventListener("change", async () => {
          const key = promptSelect.value;
          if (key && PROMPT_PATHS[key]) {
            try {
              const response = await fetch(PROMPT_PATHS[key]);
              if (!response.ok) throw new Error(`Failed to load ${key}`);
              const text = await response.text();

              const editorView = getEditorView();
              if (editorView) {
                editorView.dispatch({
                  changes: { from: 0, to: editorView.state.doc.length, insert: text }
                });
                doRender();
              }
            } catch (err) {
              console.error("Failed to load example:", err);
              alert("Failed to load example. Please try again.");
            }
          }
        });
      } catch (err) {
        document.getElementById("output").innerHTML =
          `<pre style="color:red;padding:20px">${err.stack || err.message}</pre>`;
      }
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sidebar = document.getElementById("sidebar");
      const resizer = document.getElementById("resizer");
      const outputWrapper = document.getElementById("output-wrapper");
      const output = document.getElementById("output");
      const collapseSidebar = document.getElementById("collapse-sidebar");
      const collapseOutput = document.getElementById("collapse-output");
      const restoreSidebar = document.getElementById("restore-sidebar");
      const restoreOutput = document.getElementById("restore-output");

      let isResizing = false;
      let lastSidebarWidth = 420;
      let lastOutputFlex = 1;

      // Resizer drag functionality
      resizer.addEventListener("mousedown", (e) => {
        isResizing = true;
        document.body.classList.add("resizing");
        resizer.classList.add("dragging");
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;

        const containerRect = document.querySelector(".main-container").getBoundingClientRect();
        const newSidebarWidth = e.clientX - containerRect.left;
        const minWidth = 200;
        const maxWidth = containerRect.width - 250; // Leave space for output

        if (newSidebarWidth >= minWidth && newSidebarWidth <= maxWidth) {
          sidebar.style.width = newSidebarWidth + "px";
          lastSidebarWidth = newSidebarWidth;
        }
      });

      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          document.body.classList.remove("resizing");
          resizer.classList.remove("dragging");
        }
      });

      // Collapse/expand sidebar
      collapseSidebar.addEventListener("click", () => {
        sidebar.classList.add("collapsed");
        restoreSidebar.style.display = "block";
      });

      restoreSidebar.addEventListener("click", () => {
        sidebar.classList.remove("collapsed");
        sidebar.style.width = lastSidebarWidth + "px";
        restoreSidebar.style.display = "none";
      });

      // Collapse/expand output
      collapseOutput.addEventListener("click", () => {
        outputWrapper.classList.add("collapsed");
        restoreOutput.style.display = "block";
      });

      restoreOutput.addEventListener("click", () => {
        outputWrapper.classList.remove("collapsed");
        restoreOutput.style.display = "none";
      });

      // Width control functionality
      const widthSlider = document.getElementById("width-slider");
      const widthInput = document.getElementById("width-input");
      let currentWidth = 800; // Default width

      function updateWidth(value) {
        // Clamp value to valid range
        value = Math.min(1000, Math.max(200, parseInt(value) || 800));
        currentWidth = value;
        widthSlider.value = value;
        widthInput.value = value;

        // Apply width directly to all prompt containers via inline style
        const containers = output.querySelectorAll('.prompt-container');
        containers.forEach(el => {
          el.style.maxWidth = value + 'px';
        });

        // Check for overflow after width change
        detectOverflow(output);
      }

      widthSlider.addEventListener("input", (e) => updateWidth(e.target.value));
      widthInput.addEventListener("change", (e) => updateWidth(e.target.value));

        });

        // Step 1: Hide comments and set wide container to measure natural line widths
        const comments = output.querySelectorAll('.comment, .inline-comment');
        comments.forEach(c => c.style.display = 'none');

        // Force layout recalculation
        output.offsetHeight;

        // Find the widest line of content (not the container width)
        const widestLineWidth = findWidestLineWidth(output);

        // Add padding for the prompt-container's border, padding, and breathing room
        const contentWidthWithoutComments = Math.ceil(widestLineWidth) + 60; // Account for padding/borders

        // Step 2: Restore comments and measure actual content width with comments
        comments.forEach(c => c.style.display = '');

        // Force layout recalculation with comments visible
        output.offsetHeight;

        // Measure the actual width of content including comments
        // Check both block-with-comment elements and the prompt containers themselves
        let actualContentWidth = 0;
        containers.forEach(el => {
          const rect = el.getBoundingClientRect();
          actualContentWidth = Math.max(actualContentWidth, rect.width);
        });

        // Cap the width to be at most 10px wider than the actual content
        const savedOutputWidth = output.style.width;
        const constrainedWidth = Math.min(currentWidth, Math.ceil(actualContentWidth) + 10);

        // Add a style element to FORCE the width with !important
        const widthOverrideStyle = document.createElement('style');
        widthOverrideStyle.id = 'export-width-override';
        widthOverrideStyle.textContent = `.prompt-container { width: ${constrainedWidth}px !important; max-width: ${constrainedWidth}px !important; }`;
        document.head.appendChild(widthOverrideStyle);

        // Also set inline styles as backup
        containers.forEach(el => {
          el.style.width = constrainedWidth + 'px';
          el.style.maxWidth = constrainedWidth + 'px';
        });
        output.style.setProperty('--prompt-width', constrainedWidth + 'px');

        // For each block-with-comment, calculate available width for comment
        const blockWithComments = output.querySelectorAll('.block-with-comment');
        const savedBlockStyles = [];
        const savedCommentStyles = [];
        blockWithComments.forEach(el => {
            savedBlockStyles.push({ el, style: el.style.cssText, hadClass: el.classList.contains('comment-wrapped') });
            const mainContent = el.firstElementChild;
            const comment = el.querySelector('.inline-comment, .comment');
            if (mainContent && comment) {
                savedCommentStyles.push({ el: comment, style: comment.style.cssText });
                const mainWidth = mainContent.getBoundingClientRect().width;
                const gap = 8;
                const availableForComment = constrainedWidth - 40 - mainWidth - gap;
                const commentMaxWidth = Math.max(80, availableForComment);
                comment.style.maxWidth = commentMaxWidth + 'px';
                comment.style.minWidth = '0';
                comment.style.flex = '0 1 auto';
                comment.style.whiteSpace = 'normal';
                comment.style.overflowWrap = 'break-word';
            }
        });

        // Force layout recalculation with constrained width
        output.offsetHeight;

        // Detect wrapped comments and add class for top alignment
        blockWithComments.forEach(el => {
            const comment = el.querySelector('.inline-comment, .comment');
            if (comment) {
                const lineHeight = parseFloat(getComputedStyle(comment).lineHeight) || 16;
                if (comment.offsetHeight > lineHeight * 1.5) {
                    el.classList.add('comment-wrapped');
                } else {
                    el.classList.remove('comment-wrapped');
                }
            }
        });

        // Step 3: Calculate actual content bounds (not the full container size)
        const contentElements = output.querySelectorAll('.prompt-container, .prompt-divider');
        const outputRect = output.getBoundingClientRect();
        let contentMinLeft = Infinity;
        let contentMinTop = Infinity;
        let contentMaxRight = 0;
        let contentMaxBottom = 0;

        contentElements.forEach(el => {
          const rect = el.getBoundingClientRect();
          contentMinLeft = Math.min(contentMinLeft, rect.left - outputRect.left);
          contentMinTop = Math.min(contentMinTop, rect.top - outputRect.top);
          contentMaxRight = Math.max(contentMaxRight, rect.right - outputRect.left);
          contentMaxBottom = Math.max(contentMaxBottom, rect.bottom - outputRect.top);
        });

        // Calculate content dimensions
        const contentWidth = contentMaxRight - contentMinLeft;
        const contentHeight = contentMaxBottom - contentMinTop;

        // Use the actual content bounds (or fallback to scrollWidth if no content found)
        const fullWidth = contentWidth > 0 ? contentWidth : output.scrollWidth;
        const fullHeight = contentHeight > 0 ? contentHeight : output.scrollHeight;

        // Add 4px padding on each side
        const captureWidth = Math.ceil(fullWidth) + 8;
        const captureHeight = Math.ceil(fullHeight) + 8;

        // Calculate offset to start capture at content (minus 4px padding)
        const captureX = contentMinLeft !== Infinity ? contentMinLeft - 4 : 0;
        const captureY = contentMinTop !== Infinity ? contentMinTop - 4 : 0;

        try {
          // Render the full output area first
          const fullCanvas = await html2canvas(output, {
            backgroundColor: "#ffffff",
            scale: window.devicePixelRatio * 2 || 3,
            useCORS: true,
            logging: false,
            allowTaint: true,
            imageTimeout: 0,
            onclone: (clonedDoc) => {
              // Copy all stylesheets to the cloned document
              const styles = document.querySelectorAll('link[rel="stylesheet"], style');
              styles.forEach(style => {
                clonedDoc.head.appendChild(style.cloneNode(true));
              });
              // Re-apply max-width to cloned containers to ensure they match the slider
              const clonedContainers = clonedDoc.querySelectorAll('.prompt-container');
              clonedContainers.forEach(el => {
                el.style.width = constrainedWidth + 'px';
                el.style.maxWidth = constrainedWidth + 'px';
              });
            }
          });

          // Now crop the canvas to the content bounds
          const scale = window.devicePixelRatio * 2 || 3;
          const cropX = Math.max(0, Math.floor(captureX * scale));
          const cropY = Math.max(0, Math.floor(captureY * scale));
          const cropWidth = Math.ceil(captureWidth * scale);
          const cropHeight = Math.ceil(captureHeight * scale);

          // Create a new canvas with just the cropped region
          const canvas = document.createElement('canvas');
          canvas.width = cropWidth;
          canvas.height = cropHeight;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, cropWidth, cropHeight);
          ctx.drawImage(fullCanvas, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

          return canvas;
        } finally {
          // Restore all styles
          inlineFlexEls.forEach((el, i) => { el.style.display = savedDisplays[i]; });
          markBlocks.forEach((el, i) => { el.style.cssText = savedMarkBlockStyles[i]; });
          markBrackets.forEach((el, i) => { el.style.cssText = savedMarkBracketStyles[i]; });
          markContents.forEach((el, i) => { el.style.cssText = savedMarkContentStyles[i]; });
          timeIndexEls.forEach((el, i) => { el.style.cssText = savedTimeIndexStyles[i]; });
          titleH1s.forEach((el, i) => { el.style.cssText = savedTitleStyles[i]; });
          endDashedLines.forEach((el, i) => { el.style.cssText = savedEndDashedLineStyles[i]; });
          containers.forEach((el, i) => { el.style.cssText = savedContainerStyles[i]; });
          savedBlockStyles.forEach(({ el, style, hadClass }) => { el.style.cssText = style; if (hadClass) el.classList.add('comment-wrapped'); else el.classList.remove('comment-wrapped'); });
          savedCommentStyles.forEach(({ el, style }) => { el.style.cssText = style; });
          exportFixStyle.remove();
          if (document.getElementById('export-width-override')) {
            document.getElementById('export-width-override').remove();
          }
          output.style.cssText = originalOutputStyle;
          outputWrapper.style.cssText = originalWrapperStyle;
          document.body.style.cssText = originalBodyStyle;
        }
      }

      // Export as PNG
      exportPng.addEventListener("click", async () => {
        exportMenu.classList.remove("show");

        if (!output.querySelector(".prompt-container")) {
          alert("No visualization to export. Please render a prompt first.");
          return;
        }

        exportBtn.classList.add("loading");

        try {
          const canvas = await captureAllContent();
          if (!canvas) throw new Error("Failed to capture content");

          const link = document.createElement("a");
          link.download = "acdl-visualization.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        } catch (error) {
          console.error("Export failed:", error);
          alert("Failed to export PNG. Please try again.");
        } finally {
          exportBtn.classList.remove("loading");
        }
      });

      // Export as PDF using SVG rendering
      exportPdf.addEventListener("click", async () => {
        exportMenu.classList.remove("show");

        const editorView = window.ACDLGetEditorView ? window.ACDLGetEditorView() : null;
        if (!editorView) {
          alert("Editor not initialized.");
          return;
        }
        const input = editorView.state.doc.toString();
        if (!input.trim()) {
          alert("No ACDL code to export. Please enter some code first.");
          return;
        }

        exportBtn.classList.add("loading");

        try {
          // Parse and render to SVG with width from slider
          const Parser = window.ACDLParser;
          const renderPromptsSvg = window.ACDLRenderSvg;
          const widthSlider = document.getElementById("width-slider");
          const maxWidth = widthSlider ? parseInt(widthSlider.value, 10) : undefined;
          const parser = new Parser(input);
          const ast = parser.parseFile();
          const svgContent = renderPromptsSvg(ast, maxWidth);

          // Create a temporary SVG element to get dimensions
          const tempDiv = document.createElement("div");
          tempDiv.innerHTML = svgContent;
          const svgEl = tempDiv.querySelector("svg");
          const svgWidth = parseFloat(svgEl.getAttribute("width")) || 800;
          const svgHeight = parseFloat(svgEl.getAttribute("height")) || 600;

          // Create an image from SVG
          const svgBlob = new Blob([svgContent], { type: "image/svg+xml;charset=utf-8" });
          const svgUrl = URL.createObjectURL(svgBlob);
          const img = new Image();

          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = svgUrl;
          });

          // Draw to canvas at high resolution for sharp PDF
          const scale = 4;
          const canvas = document.createElement("canvas");
          canvas.width = svgWidth * scale;
          canvas.height = svgHeight * scale;
          const ctx = canvas.getContext("2d");
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = "high";
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(svgUrl);

          // Create PDF
          const { jsPDF } = window.jspdf;
          const imgData = canvas.toDataURL("image/png");
          const pdfWidth = Math.max(210, svgWidth * 0.264583); // px to mm at 96dpi
          const pdfHeight = (svgHeight / svgWidth) * pdfWidth;
          const pdf = new jsPDF({
            orientation: pdfWidth > pdfHeight ? "landscape" : "portrait",
            unit: "mm",
            format: [pdfWidth, pdfHeight]
          });
          pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
          pdf.save("acdl-visualization.pdf");
        } catch (error) {
          console.error("Export failed:", error);
          alert("Failed to export PDF: " + error.message);
        } finally {
          exportBtn.classList.remove("loading");
        }
      });
    });
  </script>
</body>
