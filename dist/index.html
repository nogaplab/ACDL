<html>
<head>
  <meta charset="UTF-8" />
  <title>ACDL Prompt Visualizer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">


  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* Layout overrides for the app shell */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
    }

    /* Top header bar */
    header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      box-sizing: border-box;
    }

    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    #drop-zone {
      flex: 1;
      max-width: 400px;
      height: 40px;
      border: 1px dashed var(--border-medium);
      border-radius: 8px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #drop-zone:hover,
    #drop-zone.hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--system-border);
      color: var(--text-primary);
    }

    .browse-btn {
      font-size: 12px;
      color: var(--system-border);
      margin-left: 6px;
      font-weight: 400;
    }

    /* Main content area */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar editor panel */
    #sidebar {
      width: 420px;
      min-width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
      box-sizing: border-box;
      transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease;
    }

    #sidebar.collapsed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-header h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-toggle-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .panel-toggle-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-medium);
    }

    #acdl-editor-container {
      flex: 1;
      width: 100%;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #acdl-editor-container:focus-within {
      border-color: var(--system-border);
      box-shadow: 0 0 0 3px var(--system-glow);
    }

    #acdl-editor-container .cm-editor {
      height: 100%;
    }

    #acdl-editor-container .cm-scroller {
      overflow: auto;
    }

    #render-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.25);
    }

    #render-btn:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.35);
    }

    /* Resizer between panels */
    .resizer {
      width: 6px;
      background: var(--border-subtle);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s ease;
      position: relative;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--system-border);
    }

    .resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 30px;
      background: var(--text-muted);
      border-radius: 1px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .resizer:hover::after,
    .resizer.dragging::after {
      opacity: 1;
    }

    /* Output visualization panel */
    #output-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
      transition: min-width 0.3s ease;
    }

    #output-wrapper.collapsed {
      min-width: 0 !important;
      flex: 0 !important;
      width: 0 !important;
      overflow: hidden;
    }

    #output-wrapper.collapsed #output-header,
    #output-wrapper.collapsed #output {
      display: none;
    }

    #output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
    }

    #output-header h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background: var(--bg-primary);
    }

    /* Collapsed panel restore buttons */
    .restore-btn {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      font-size: 12px;
      transition: all 0.2s ease;
      display: none;
      z-index: 100;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .restore-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--system-border);
    }

    #restore-sidebar {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      border-left: none;
      border-radius: 0 4px 4px 0;
    }

    #restore-output {
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      border-right: none;
      border-radius: 4px 0 0 4px;
    }

    #sidebar.collapsed ~ .resizer ~ #output-wrapper #restore-sidebar,
    .main-container:has(#sidebar.collapsed) #restore-sidebar {
      display: block;
    }

    body:has(#sidebar.collapsed) #restore-sidebar {
      display: block;
    }

    body:has(#output-wrapper.collapsed) #restore-output {
      display: block;
    }

    /* Info message styling */
    .info-msg {
      color: var(--text-secondary);
      text-align: center;
      padding: 60px 40px;
      font-size: 15px;
    }

    /* Collapsible support */
    .collapsed > .block-children,
    .collapsed > .role-body-block,
    .collapsed > .loop-child,
    .collapsed > .role-loop-child,
    .collapsed > .switch-child,
    .collapsed > .role-switch-child,
    .collapsed > .role-condition-child {
      display: none !important;
    }

    /* Prevent text selection while dragging */
    body.resizing {
      user-select: none;
      cursor: col-resize;
    }

    /* Export button and dropdown */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .export-dropdown {
      position: relative;
    }

    .export-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .export-btn:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
    }

    .export-btn:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .export-btn svg {
      width: 14px;
      height: 14px;
    }

    .export-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 4px;
      min-width: 140px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      display: none;
    }

    .export-menu.show {
      display: block;
    }

    .export-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .export-menu-item:hover {
      background: var(--bg-tertiary);
    }

    .export-menu-item svg {
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
    }

    /* Export loading state */
    .export-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .export-btn.loading::after {
      content: '';
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 4px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

  </style>

<body>

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sidebar = document.getElementById("sidebar");
      const resizer = document.getElementById("resizer");
      const outputWrapper = document.getElementById("output-wrapper");
      const collapseSidebar = document.getElementById("collapse-sidebar");
      const collapseOutput = document.getElementById("collapse-output");
      const restoreSidebar = document.getElementById("restore-sidebar");
      const restoreOutput = document.getElementById("restore-output");

      let isResizing = false;
      let lastSidebarWidth = 420;
      let lastOutputFlex = 1;

      // Resizer drag functionality
      resizer.addEventListener("mousedown", (e) => {
        isResizing = true;
        document.body.classList.add("resizing");
        resizer.classList.add("dragging");
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;

        const containerRect = document.querySelector(".main-container").getBoundingClientRect();
        const newSidebarWidth = e.clientX - containerRect.left;
        const minWidth = 200;
        const maxWidth = containerRect.width - 250; // Leave space for output

        if (newSidebarWidth >= minWidth && newSidebarWidth <= maxWidth) {
          sidebar.style.width = newSidebarWidth + "px";
          lastSidebarWidth = newSidebarWidth;
        }
      });

      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          document.body.classList.remove("resizing");
          resizer.classList.remove("dragging");
        }
      });

      // Collapse/expand sidebar
      collapseSidebar.addEventListener("click", () => {
        sidebar.classList.add("collapsed");
        restoreSidebar.style.display = "block";
      });

      restoreSidebar.addEventListener("click", () => {
        sidebar.classList.remove("collapsed");
        sidebar.style.width = lastSidebarWidth + "px";
        restoreSidebar.style.display = "none";
      });

      // Collapse/expand output
      collapseOutput.addEventListener("click", () => {
        outputWrapper.classList.add("collapsed");
        restoreOutput.style.display = "block";
      });

      restoreOutput.addEventListener("click", () => {
        outputWrapper.classList.remove("collapsed");
        restoreOutput.style.display = "none";
      });

      // Export functionality
      const exportBtn = document.getElementById("export-btn");
      const exportMenu = document.getElementById("export-menu");
      const exportPng = document.getElementById("export-png");
      const exportPdf = document.getElementById("export-pdf");

      // Toggle export menu
      exportBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        exportMenu.classList.toggle("show");
      });

      // Close menu when clicking outside
      document.addEventListener("click", () => {
        exportMenu.classList.remove("show");
      });

      // Helper function to capture full content
      async function captureFullContent() {
        // Check if there's any content to capture
        if (!output.querySelector(".prompt-container")) return null;

        // Capture the entire output element to include all prompts and dividers
        const content = output;

        // Store original styles for all affected elements
        const originalOutputStyle = output.style.cssText;
        const originalContentStyle = content.style.cssText;
        const originalWrapperStyle = outputWrapper.style.cssText;
        const originalBodyStyle = document.body.style.cssText;

        // Temporarily remove all constraints to allow full content measurement
        output.style.overflow = "visible";
        output.style.height = "auto";
        output.style.maxHeight = "none";
        output.style.position = "relative";
        outputWrapper.style.overflow = "visible";
        outputWrapper.style.height = "auto";
        document.body.style.overflow = "visible";

        // html2canvas doesn't render text inside inline-flex elements properly
        // in certain nesting contexts (e.g. context-vars inside ForEach loops).
        // Temporarily switch to inline-block for the capture.
        const inlineFlexEls = content.querySelectorAll(".context-var, .template-block, .func-block, .expr-context-var");
        const savedDisplays = [];
        inlineFlexEls.forEach(el => {
          savedDisplays.push(el.style.display);
          el.style.display = "inline-block";
        });

        // Fix mark blocks - html2canvas has issues with absolute positioning
        // Convert back to flex layout for capture
        const markBlocks = content.querySelectorAll(".mark-block");
        const savedMarkBlockStyles = [];
        markBlocks.forEach(el => {
          savedMarkBlockStyles.push(el.style.cssText);
          el.style.display = "flex";
          el.style.alignItems = "stretch";
          el.style.paddingRight = "0";
        });

        const markBrackets = content.querySelectorAll(".mark-block-bracket");
        const savedMarkBracketStyles = [];
        markBrackets.forEach(el => {
          savedMarkBracketStyles.push(el.style.cssText);
          el.style.position = "relative";
          el.style.right = "auto";
          el.style.top = "auto";
          el.style.bottom = "auto";
          el.style.marginLeft = "8px";
        });

        const markContents = content.querySelectorAll(".mark-block-content");
        const savedMarkContentStyles = [];
        markContents.forEach(el => {
          savedMarkContentStyles.push(el.style.cssText);
          el.style.flex = "1";
        });

        // Fix time-index and other-index elements - html2canvas doesn't support CSS variables
        // Apply inline styles directly for reliable rendering
        const timeIndexEls = content.querySelectorAll(".time-index, .other-index");
        const savedTimeIndexStyles = [];
        timeIndexEls.forEach(el => {
          savedTimeIndexStyles.push(el.style.cssText);
          el.style.display = "inline";
          el.style.color = "#0969da";
          el.style.fontWeight = "700";
          el.style.fontFamily = "'JetBrains Mono', 'SF Mono', monospace";
        });

        // Fix title to prevent wrapping
        const titleH1 = content.querySelector(".prompt-title h1");
        const savedTitleStyle = titleH1 ? titleH1.style.cssText : "";
        if (titleH1) {
          titleH1.style.whiteSpace = "nowrap";
        }

        // Fix container width - html2canvas doesn't support fit-content
        const savedContainerWidth = content.style.width;
        const savedContainerMinWidth = content.style.minWidth;
        content.style.width = "auto";
        content.style.minWidth = "200px";

        // html2canvas misrenders ::before pseudo-elements when display is
        // inline-block instead of inline-flex (the diamond loses flex
        // alignment and appears as a misplaced dot). Inject a temporary
        // style that corrects the positioning for the capture.
        const exportFixStyle = document.createElement("style");
        exportFixStyle.textContent = `
          .template-block::before {
            vertical-align: middle;
            line-height: 1;
            position: relative;
            top: -1px;
          }

        document.head.appendChild(exportFixStyle);

        content.offsetHeight;

        // Get the full scrollable dimensions
        const fullWidth = Math.max(
          content.scrollWidth,
          content.offsetWidth,
          content.getBoundingClientRect().width
        );
        const fullHeight = Math.max(
          content.scrollHeight,
          content.offsetHeight,
          content.getBoundingClientRect().height
        );

        // Add padding to ensure nothing gets cropped (especially bottom)
        const captureWidth = Math.ceil(fullWidth) + 40;
        const captureHeight = Math.ceil(fullHeight) + 60;

        try {
          const canvas = await html2canvas(content, {
            backgroundColor: "#ffffff",
            scale: window.devicePixelRatio * 2 || 3,
            useCORS: true,
            logging: true, // Enable logging for debugging
            width: captureWidth,
            height: captureHeight,
            windowWidth: captureWidth,
            windowHeight: captureHeight,
            scrollX: 0,
            scrollY: 0,
            x: 0,
            y: 0,
            allowTaint: true,
            imageTimeout: 0,
            // Ensure styles are cloned properly
            onclone: (clonedDoc) => {
              // Copy all stylesheets to the cloned document
              const styles = document.querySelectorAll('link[rel="stylesheet"], style');
              styles.forEach(style => {
                clonedDoc.head.appendChild(style.cloneNode(true));
              });
            }
          });
          return canvas;
        } finally {
          // Restore inline-flex display on captured elements
          inlineFlexEls.forEach((el, i) => {
            el.style.display = savedDisplays[i];
          });

          // Restore mark block styles
          markBlocks.forEach((el, i) => {
            el.style.cssText = savedMarkBlockStyles[i];
          });
          markBrackets.forEach((el, i) => {
            el.style.cssText = savedMarkBracketStyles[i];
          });
          markContents.forEach((el, i) => {
            el.style.cssText = savedMarkContentStyles[i];
          });

          // Restore time-index and other-index styles
          timeIndexEls.forEach((el, i) => {
            el.style.cssText = savedTimeIndexStyles[i];
          });

          // Restore title style
          if (titleH1) {
            titleH1.style.cssText = savedTitleStyle;
          }

          // Restore container width
          content.style.width = savedContainerWidth;
          content.style.minWidth = savedContainerMinWidth;

          // Remove the temporary export fix style
          exportFixStyle.remove();

          // Restore original styles
          output.style.cssText = originalOutputStyle;
          content.style.cssText = originalContentStyle;
          outputWrapper.style.cssText = originalWrapperStyle;
          document.body.style.cssText = originalBodyStyle;
        }
      }

        const savedMarkBracketStyles = [];
        markBrackets.forEach(el => {
          savedMarkBracketStyles.push(el.style.cssText);
          el.style.position = "relative";
          el.style.right = "auto";
          el.style.top = "auto";
          el.style.bottom = "auto";
          el.style.marginLeft = "8px";
        });

        const markContents = promptContainer.querySelectorAll(".mark-block-content");
        const savedMarkContentStyles = [];
        markContents.forEach(el => {
          savedMarkContentStyles.push(el.style.cssText);
          el.style.flex = "1";
        });

        // Fix time-index elements
        const timeIndexEls = promptContainer.querySelectorAll(".time-index, .other-index");
        const savedTimeIndexStyles = [];
        timeIndexEls.forEach(el => {
          savedTimeIndexStyles.push(el.style.cssText);
          el.style.display = "inline";
          el.style.color = "#0969da";
          el.style.fontWeight = "700";
          el.style.fontFamily = "'JetBrains Mono', 'SF Mono', monospace";
        });

        // Fix title
        const titleH1 = promptContainer.querySelector(".prompt-title h1");
        const savedTitleStyle = titleH1 ? titleH1.style.cssText : "";
        if (titleH1) {
          titleH1.style.whiteSpace = "nowrap";
        }

        // Add export fix style
        const exportFixStyle = document.createElement("style");
        exportFixStyle.textContent = `
          .template-block::before {
            vertical-align: middle;
            line-height: 1;
            position: relative;
            top: -1px;
          }
        `;
        document.head.appendChild(exportFixStyle);

        // Force layout recalculation
        promptContainer.offsetHeight;

        // Get dimensions
        const fullWidth = Math.max(
          promptContainer.scrollWidth,
          promptContainer.offsetWidth,
          promptContainer.getBoundingClientRect().width
        );
        const fullHeight = Math.max(
          promptContainer.scrollHeight,
          promptContainer.offsetHeight,
          promptContainer.getBoundingClientRect().height
        );

        const captureWidth = Math.ceil(fullWidth) + 40;
        const captureHeight = Math.ceil(fullHeight) + 60;

        try {
          const canvas = await html2canvas(promptContainer, {
            backgroundColor: "#ffffff",
            scale: window.devicePixelRatio * 2 || 3,
            useCORS: true,
            logging: false,
            width: captureWidth,
            height: captureHeight,
            windowWidth: captureWidth,
            windowHeight: captureHeight,
            scrollX: 0,
            scrollY: 0,
            x: 0,
            y: 0,
            allowTaint: true,
            imageTimeout: 0
          });
          return canvas;
        } finally {
          // Restore all styles
          inlineFlexEls.forEach((el, i) => { el.style.display = savedDisplays[i]; });
          markBlocks.forEach((el, i) => { el.style.cssText = savedMarkBlockStyles[i]; });
          markBrackets.forEach((el, i) => { el.style.cssText = savedMarkBracketStyles[i]; });
          markContents.forEach((el, i) => { el.style.cssText = savedMarkContentStyles[i]; });
          timeIndexEls.forEach((el, i) => { el.style.cssText = savedTimeIndexStyles[i]; });
          if (titleH1) { titleH1.style.cssText = savedTitleStyle; }
          exportFixStyle.remove();
          output.style.cssText = originalOutputStyle;
          outputWrapper.style.cssText = originalWrapperStyle;
          document.body.style.cssText = originalBodyStyle;
        }
      }

      // Helper to capture all content (entire output)
      async function captureAllContent() {
        if (!output.querySelector(".prompt-container")) return null;

        // Store original styles
        const originalOutputStyle = output.style.cssText;
        const originalWrapperStyle = outputWrapper.style.cssText;
        const originalBodyStyle = document.body.style.cssText;

        // Temporarily remove all constraints
        output.style.overflow = "visible";
        output.style.height = "auto";
        output.style.maxHeight = "none";
        output.style.position = "relative";
        outputWrapper.style.overflow = "visible";
        outputWrapper.style.height = "auto";
        document.body.style.overflow = "visible";

        // Fix inline-flex elements
        const inlineFlexEls = output.querySelectorAll(".context-var, .template-block, .func-block, .expr-context-var");
        const savedDisplays = [];
        inlineFlexEls.forEach(el => {
          savedDisplays.push(el.style.display);
          el.style.display = "inline-block";
        });

        // Fix mark blocks
        const markBlocks = output.querySelectorAll(".mark-block");
        const savedMarkBlockStyles = [];
        markBlocks.forEach(el => {
          savedMarkBlockStyles.push(el.style.cssText);
          el.style.display = "flex";
          el.style.alignItems = "stretch";
          el.style.paddingRight = "0";
        });

        const markBrackets = output.querySelectorAll(".mark-block-bracket");
        const savedMarkBracketStyles = [];
        markBrackets.forEach(el => {
          savedMarkBracketStyles.push(el.style.cssText);
          el.style.position = "relative";
          el.style.right = "auto";
          el.style.top = "auto";
          el.style.bottom = "auto";
          el.style.marginLeft = "8px";
        });

        const markContents = output.querySelectorAll(".mark-block-content");
        const savedMarkContentStyles = [];
        markContents.forEach(el => {
          savedMarkContentStyles.push(el.style.cssText);
          el.style.flex = "1";
        });

        // Fix time-index elements
        const timeIndexEls = output.querySelectorAll(".time-index, .other-index");
        const savedTimeIndexStyles = [];
        timeIndexEls.forEach(el => {
          savedTimeIndexStyles.push(el.style.cssText);
          el.style.display = "inline";
          el.style.color = "#0969da";
          el.style.fontWeight = "700";
          el.style.fontFamily = "'JetBrains Mono', 'SF Mono', monospace";
        });

        // Fix titles
        const titleH1s = output.querySelectorAll(".prompt-title h1");
        const savedTitleStyles = [];
        titleH1s.forEach(el => {
          savedTitleStyles.push(el.style.cssText);
          el.style.whiteSpace = "nowrap";
        });

        // Add export fix style
        const exportFixStyle = document.createElement("style");
        exportFixStyle.textContent = `
          .template-block::before {
            vertical-align: middle;
            line-height: 1;
            position: relative;
            top: -1px;
          }
        `;
        document.head.appendChild(exportFixStyle);

        // Force layout recalculation
        output.offsetHeight;

        // Get dimensions
        const fullWidth = Math.max(
          output.scrollWidth,
          output.offsetWidth,
          output.getBoundingClientRect().width
        );
        const fullHeight = Math.max(
          output.scrollHeight,
          output.offsetHeight,
          output.getBoundingClientRect().height
        );

        const captureWidth = Math.ceil(fullWidth) + 40;
        const captureHeight = Math.ceil(fullHeight) + 60;

        try {
          const canvas = await html2canvas(output, {
            backgroundColor: "#ffffff",
            scale: window.devicePixelRatio * 2 || 3,
            useCORS: true,
            logging: false,
            width: captureWidth,
            height: captureHeight,
            windowWidth: captureWidth,
            windowHeight: captureHeight,
            scrollX: 0,
            scrollY: 0,
            x: 0,
            y: 0,
            allowTaint: true,
            imageTimeout: 0
          });
          return canvas;
        } finally {
          // Restore all styles
          inlineFlexEls.forEach((el, i) => { el.style.display = savedDisplays[i]; });
          markBlocks.forEach((el, i) => { el.style.cssText = savedMarkBlockStyles[i]; });
          markBrackets.forEach((el, i) => { el.style.cssText = savedMarkBracketStyles[i]; });
          markContents.forEach((el, i) => { el.style.cssText = savedMarkContentStyles[i]; });
          timeIndexEls.forEach((el, i) => { el.style.cssText = savedTimeIndexStyles[i]; });
          titleH1s.forEach((el, i) => { el.style.cssText = savedTitleStyles[i]; });
          exportFixStyle.remove();
          output.style.cssText = originalOutputStyle;
          outputWrapper.style.cssText = originalWrapperStyle;
          document.body.style.cssText = originalBodyStyle;
        }
      }

      // Export as PNG
      exportPng.addEventListener("click", async () => {
        exportMenu.classList.remove("show");

        if (!output.querySelector(".prompt-container")) {
          alert("No visualization to export. Please render a flowchart first.");
          return;
        }

        exportBtn.classList.add("loading");

        try {
          const canvas = await captureAllContent();
          if (!canvas) throw new Error("Failed to capture content");

          const link = document.createElement("a");
          link.download = "acdl-visualization.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        } catch (error) {
          console.error("Export failed:", error);
          alert("Failed to export PNG. Please try again.");
        } finally {
          exportBtn.classList.remove("loading");
        }
      });

      // Export as PDF
      exportPdf.addEventListener("click", async () => {
        exportMenu.classList.remove("show");

        if (!output.querySelector(".prompt-container")) {
          alert("No visualization to export. Please render a flowchart first.");
          return;
        }

        exportBtn.classList.add("loading");

        try {
          const canvas = await captureAllContent();
          if (!canvas) throw new Error("Failed to capture content");

          const { jsPDF } = window.jspdf;
          const imgData = canvas.toDataURL("image/png");

          // Calculate dimensions to fit the content
          const imgWidth = canvas.width;
          const imgHeight = canvas.height;

          // Use A4 as base, but adjust if content is wider
          const pdfWidth = Math.max(210, (imgWidth / 2) * 0.264583); // Convert px to mm at scale 2
          const pdfHeight = (imgHeight / imgWidth) * pdfWidth;

          const pdf = new jsPDF({
            orientation: pdfWidth > pdfHeight ? "landscape" : "portrait",
            unit: "mm",
            format: [pdfWidth, pdfHeight]
          });

          pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
          pdf.save("acdl-visualization.pdf");
        } catch (error) {
          console.error("Export failed:", error);
          alert("Failed to export PDF. Please try again.");
        } finally {
          exportBtn.classList.remove("loading");
        }
      });
    });
  </script>
</body>
